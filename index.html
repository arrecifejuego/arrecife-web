<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Arrecife — Simulación de Partida</title>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  background:#000;
  color:white;
  font-family:Arial,sans-serif;
  overflow-x:hidden;
  min-height:100vh;
  padding:40px 20px 120px;
  position:relative;
}

/* =========================
   FONDO
========================= */

.ocean{
  position:fixed;
  inset:0;
  overflow:hidden;
  z-index:0;
  pointer-events:none;
}

.wave{
  position:absolute;
  width:220%;
  height:220%;
  left:-60%;
  top:-60%;

  background:
    radial-gradient(
      circle at center,
      rgba(126,231,255,0.045),
      transparent 60%
    );

  animation:rotateWave 50s linear infinite;
}

.wave2{
  animation-duration:80s;
  opacity:0.45;
  transform:scale(1.3);
}

.wave3{
  animation-duration:110s;
  opacity:0.2;
  transform:scale(1.5);
}

@keyframes rotateWave{

  from{
    transform:rotate(0deg);
  }

  to{
    transform:rotate(360deg);
  }

}

.deep-sea{
  position:fixed;
  inset:0;
  overflow:hidden;
  pointer-events:none;
  z-index:0;
}

.creature{

  position:absolute;

  border:
    1px solid rgba(126,231,255,0.18);

  opacity:0.18;

  filter:blur(0.5px);

  box-shadow:
    0 0 18px rgba(126,231,255,0.12),
    0 0 50px rgba(126,231,255,0.06);

}

.creature1{
  width:520px;
  height:170px;
  border-radius:50%;
  left:-700px;
  top:18%;
  animation:swim1 65s linear infinite;
}

.creature2{
  width:300px;
  height:300px;
  border-radius:35%;
  right:-400px;
  top:70%;
  transform:rotate(45deg);
  animation:swim2 90s linear infinite;
}

.creature3{
  width:700px;
  height:120px;
  border-radius:50%;
  left:-900px;
  top:78%;
  animation:swim3 110s linear infinite;
}

@keyframes swim1{

  from{
    transform:
      translateX(0)
      rotate(0deg);
  }

  to{
    transform:
      translateX(2600px)
      rotate(6deg);
  }

}

@keyframes swim2{

  from{
    transform:
      translateX(0)
      rotate(45deg);
  }

  to{
    transform:
      translateX(-2600px)
      rotate(80deg);
  }

}

@keyframes swim3{

  from{
    transform:
      translateX(0);
  }

  to{
    transform:
      translateX(3000px);
  }

}

/* =========================
   CONTENIDO
========================= */

.container{
  position:relative;
  z-index:2;
  max-width:1400px;
  margin:auto;
}

.logo{
  text-align:center;
  letter-spacing:10px;
  opacity:0.45;
  font-size:12px;
  margin-bottom:20px;
}

h1{
  text-align:center;
  font-weight:normal;
  margin-bottom:12px;
  font-size:42px;
}

.sub{
  text-align:center;
  opacity:0.45;
  margin-bottom:60px;
  line-height:1.8;
  font-size:14px;
}

/* =========================
   STATUS
========================= */

.status{

  display:flex;
  justify-content:center;
  gap:20px;
  flex-wrap:wrap;

  margin-bottom:50px;

}

.status-box{

  border:1px solid rgba(255,255,255,0.08);

  padding:18px 25px;

  min-width:180px;

  text-align:center;

  background:rgba(255,255,255,0.02);

  backdrop-filter:blur(6px);

}

.status-box h3{

  font-size:11px;
  letter-spacing:3px;
  opacity:0.45;
  margin-bottom:12px;
  font-weight:normal;

}

.status-box p{
  font-size:24px;
}

/* =========================
   JUGADORES
========================= */

.players{

  display:grid;

  grid-template-columns:
    repeat(auto-fit,minmax(320px,1fr));

  gap:25px;

  margin-bottom:60px;

}

.player{

  border:1px solid rgba(255,255,255,0.08);

  padding:25px;

  background:rgba(255,255,255,0.03);

  backdrop-filter:blur(6px);

  position:relative;

  overflow:hidden;

}

.player.you{
  border-color:rgba(126,231,255,0.35);
}

.player-header{

  display:flex;
  justify-content:space-between;
  align-items:center;

  margin-bottom:20px;

}

.player-name{

  letter-spacing:3px;
  font-size:12px;
  opacity:0.6;

}

.hp{

  font-size:13px;
  opacity:0.7;
}

.dead{
  opacity:0.3;
}

/* =========================
   MESA
========================= */

.table{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
  margin-bottom:22px;
  min-height:64px;
}

.played-card{

  border:1px solid rgba(126,231,255,0.18);

  padding:10px 14px;

  background:rgba(126,231,255,0.05);

  min-width:58px;

  text-align:center;

  letter-spacing:1px;

  animation:fadeCard 0.5s ease;

}

@keyframes fadeCard{

  from{
    opacity:0;
    transform:translateY(10px);
  }

  to{
    opacity:1;
    transform:translateY(0);
  }

}

/* =========================
   CARTAS
========================= */

.hand-title{
  font-size:11px;
  opacity:0.45;
  letter-spacing:2px;
  margin-bottom:12px;
}

.hand{

  display:flex;
  flex-wrap:wrap;
  gap:10px;

}

.card{

  border:1px solid rgba(255,255,255,0.12);

  padding:12px 14px;

  cursor:pointer;

  transition:0.25s;

  background:rgba(255,255,255,0.02);

  min-width:58px;

  text-align:center;

  user-select:none;

}

.card:hover{

  border-color:#7ee7ff;

  box-shadow:
    0 0 18px rgba(126,231,255,0.18);

  transform:translateY(-2px);

}

.card.used{
  opacity:0.25;
  pointer-events:none;
}

/* =========================
   BOTON
========================= */

.controls{
  text-align:center;
  margin-bottom:60px;
}

button{

  background:transparent;

  border:1px solid rgba(255,255,255,0.2);

  color:white;

  padding:16px 40px;

  letter-spacing:3px;

  cursor:pointer;

  transition:0.3s;

  font-size:12px;

}

button:hover{

  background:#7ee7ff;

  color:black;

  box-shadow:
    0 0 25px rgba(126,231,255,0.25);

}

/* =========================
   RESULTADO
========================= */

.resultado{

  max-width:900px;
  margin:auto;

  border-top:
    1px solid rgba(255,255,255,0.08);

  padding-top:50px;

}

.bloque{
  margin-bottom:35px;
}

.bloque h2{

  font-size:12px;

  font-weight:normal;

  letter-spacing:4px;

  opacity:0.45;

  margin-bottom:12px;

}

.bloque p{
  font-size:22px;
  line-height:1.8;
}

.evento{

  margin-top:20px;

  margin-bottom:35px;

  padding:20px;

  border:
    1px solid rgba(126,231,255,0.18);

  background:
    rgba(126,231,255,0.05);

  box-shadow:
    0 0 20px rgba(126,231,255,0.08);

}

.final{

  text-align:center;

  font-size:34px;

  opacity:0.7;

  margin-top:80px;

  letter-spacing:3px;

}

@media(max-width:700px){

  h1{
    font-size:30px;
  }

}

</style>

</head>

<body>

<div class="ocean">

  <div class="wave"></div>
  <div class="wave wave2"></div>
  <div class="wave wave3"></div>

</div>

<div class="deep-sea">

  <div class="creature creature1"></div>
  <div class="creature creature2"></div>
  <div class="creature creature3"></div>

</div>

<div class="container">

  <div class="logo">
    ARRECIFE
  </div>

  <h1>Simulación de Partida</h1>

  <div class="sub">
    Interpretá al grupo.<br>
    El mar observa todo.
  </div>

  <div class="status">

    <div class="status-box">
      <h3>RONDA</h3>
      <p id="round">1</p>
    </div>

    <div class="status-box">
      <h3>FASE</h3>
      <p id="phase">1 / 3</p>
    </div>

    <div class="status-box">
      <h3>AMULETO</h3>
      <p id="amulet">TÚ</p>
    </div>

  </div>

  <div class="players" id="players"></div>

  <div class="controls">

    <button id="resolveBtn" style="display:none;">
      RESOLVER RONDA
    </button>

  </div>

  <div class="resultado" id="resultado"></div>

</div>

<script>

/* =========================
   ESTADO
========================= */

const players = [

  {
    id:0,
    name:"TÚ",
    hp:10,
    isBot:false,
    played:[]
  },

  {
    id:1,
    name:"BOT 1",
    hp:10,
    isBot:true,
    played:[]
  },

  {
    id:2,
    name:"BOT 2",
    hp:10,
    isBot:true,
    played:[]
  }

];

let round = 1;
let phase = 1;
let amuletIndex = 0;

const playersDiv =
document.getElementById("players");

const resultDiv =
document.getElementById("resultado");

const resolveBtn =
document.getElementById("resolveBtn");

/* =========================
   CARTAS
========================= */

const teamCards = [
  "Algas",
  "Corales"
];

const signCards = [
  "+",
  "-"
];

const valueCards = [
  1,2,3,4,5
];

/* =========================
   RENDER
========================= */

function render(){

  document.getElementById("round")
  .innerText = round;

  document.getElementById("phase")
  .innerText = phase + " / 3";

  document.getElementById("amulet")
  .innerText =
    players[amuletIndex].name;

  playersDiv.innerHTML = "";

  players.forEach(player=>{

    const div =
      document.createElement("div");

    div.className =
      "player " +
      (player.isBot ? "" : "you") +
      (player.hp <= 0 ? " dead" : "");

    div.innerHTML = `

      <div class="player-header">

        <div class="player-name">
          ${player.name}
        </div>

        <div class="hp">
          ${Math.max(0,player.hp)} HP
        </div>

      </div>

      <div class="table">

        ${player.played.map(card=>`

          <div class="played-card">
            ${card}
          </div>

        `).join("")}

      </div>

      ${
        !player.isBot && player.hp > 0
        ? renderHand(player)
        : ""
      }

    `;

    playersDiv.appendChild(div);

  });

}

/* =========================
   MANO
========================= */

function renderHand(player){

  let cards = [];

  if(!player.played.some(c=>c==="Algas"||c==="Corales")){

    cards.push(...teamCards);

  }

  if(!player.played.some(c=>c==="+"||c==="-" )){

    cards.push(...signCards);

  }

  const alreadyValues =
    player.played.filter(c=>!isNaN(c));

  if(alreadyValues.length === 0){

    cards.push(...valueCards);

  }

  return `

    <div class="hand-title">
      ELEGIR CARTA
    </div>

    <div class="hand">

      ${cards.map(card=>`

        <div
          class="card"
          onclick="playCard('${card}')"
        >
          ${card}
        </div>

      `).join("")}

    </div>

  `;

}

/* =========================
   JUGAR CARTA
========================= */

function playCard(card){

  const player = players[0];

  if(player.played.length >= 3){
    return;
  }

  player.played.push(card);

  botsPlay();

  phase++;

  if(phase > 3){

    phase = 3;

    resolveBtn.style.display =
      "inline-block";

  }

  render();

}

/* =========================
   BOTS
========================= */

function botsPlay(){

  players.forEach(player=>{

    if(!player.isBot || player.hp <= 0){
      return;
    }

    if(player.played.length >= phase){
      return;
    }

    let options = [];

    if(!player.played.some(c=>c==="Algas"||c==="Corales")){

      options.push(...teamCards);

    }

    if(!player.played.some(c=>c==="+"||c==="-" )){

      options.push(...signCards);

    }

    const hasValue =
      player.played.some(c=>!isNaN(c));

    if(!hasValue){

      options.push(...valueCards);

    }

    const pick =
      options[
        Math.floor(Math.random()*options.length)
      ];

    player.played.push(pick);

  });

}

/* =========================
   RESOLVER
========================= */

resolveBtn.addEventListener(
  "click",
  resolveRound
);

function resolveRound(){

  resolveBtn.style.display = "none";

  const alive =
    players.filter(p=>p.hp > 0);

  const parsed = alive.map(p=>{

    const team =
      p.played.find(c=>
        c==="Algas" || c==="Corales"
      );

    const sign =
      p.played.find(c=>
        c==="+" || c==="-" 
      );

    const value =
      parseInt(
        p.played.find(c=>!isNaN(c))
      );

    return {

      ref:p,

      team,
      sign,
      value,

      aporte:
        sign === "+"
        ? value
        : -value

    };

  });

  const algas =
    parsed.filter(p=>p.team==="Algas");

  const corales =
    parsed.filter(p=>p.team==="Corales");

  if(
    algas.length === 0 ||
    corales.length === 0
  ){

    resultDiv.innerHTML = `

      <div class="bloque">

        <h2>RESULTADO</h2>

        <p>
          Todos eligieron el mismo equipo.
        </p>

      </div>

      <div class="evento">
        La ronda se reinicia.
      </div>

    `;

    nextRound();
    return;

  }

  let mayoria;
  let minoria;

  const amuletTeam =
    parsed.find(
      p=>p.ref.id===amuletIndex
    )?.team;

  if(
    algas.length > corales.length ||
    (
      algas.length === corales.length &&
      amuletTeam === "Algas"
    )
  ){

    mayoria = algas;
    minoria = corales;

  }else{

    mayoria = corales;
    minoria = algas;

  }

  const sumaMayoriaReal =
    mayoria.reduce(
      (a,b)=>a+b.aporte,
      0
    );

  const sumaMinoriaReal =
    minoria.reduce(
      (a,b)=>a+b.aporte,
      0
    );

  const sumaMayoria =
    Math.abs(sumaMayoriaReal);

  const sumaMinoria =
    Math.abs(sumaMinoriaReal);

  let dañoHacia =
    sumaMayoria > alive.length
    ? "Mayoría"
    : "Minoría";

  let tornado = false;

  if(
    sumaMinoria > sumaMayoria &&
    sumaMayoria !== 0
  ){

    tornado = true;

    dañoHacia =
      dañoHacia === "Mayoría"
      ? "Minoría"
      : "Mayoría";

  }

  let html = `

    <div class="bloque">

      <h2>MAYORÍA</h2>

      <p>
        ${mayoria[0].team}
      </p>

    </div>

    <div class="bloque">

      <h2>MINORÍA</h2>

      <p>
        ${minoria[0].team}
      </p>

    </div>

    <div class="bloque">

      <h2>SUMA MAYORÍA</h2>

      <p>
        ${sumaMayoriaReal}
      </p>

    </div>

    <div class="bloque">

      <h2>SUMA MINORÍA</h2>

      <p>
        ${sumaMinoriaReal}
      </p>

    </div>

  `;

  if(sumaMayoria === 0){

    minoria.forEach(p=>{

      p.ref.hp =
        Math.min(
          10,
          p.ref.hp + 2
        );

    });

    html += `

      <div class="evento">

        MAREA ACTIVADA
        <br><br>

        La Minoría recupera 2 HP.

      </div>

    `;

  }else{

    const target =
      dañoHacia === "Mayoría"
      ? mayoria
      : minoria;

    target.forEach(p=>{

      p.ref.hp -= sumaMayoria;

    });

    if(tornado){

      html += `

        <div class="evento">

          TORNADO ACTIVADO
          <br><br>

          La Minoría altera el resultado.

        </div>

      `;

    }

    html += `

      <div class="bloque">

        <h2>RESULTADO FINAL</h2>

        <p>
          La ${dañoHacia}
          recibe ${sumaMayoria}
          de daño.
        </p>

      </div>

    `;

  }

  resultDiv.innerHTML = html;

  const stillAlive =
    players.filter(p=>p.hp > 0);

  if(stillAlive.length <= 1){

    resultDiv.innerHTML += `

      <div class="final">
        SIMULACIÓN FINALIZADA
      </div>

    `;

    render();

    return;

  }

  setTimeout(()=>{

    nextRound();

  },2500);

}

/* =========================
   NUEVA RONDA
========================= */

function nextRound(){

  players.forEach(player=>{

    player.played = [];

  });

  round++;

  phase = 1;

  amuletIndex++;

  if(amuletIndex >= players.length){

    amuletIndex = 0;

  }

  render();

}

/* =========================
   INICIO
========================= */

render();

</script>

</body>
</html>
