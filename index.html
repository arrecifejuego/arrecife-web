<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Simulación — Arrecife</title>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{

  background:#000;
  color:white;

  font-family:Arial,sans-serif;

  overflow:hidden;

  height:100vh;

  position:relative;

}

/* =========================
   FONDO
========================= */

body::before{

  content:"";

  position:fixed;

  inset:0;

  background:

    radial-gradient(
      circle at center,
      rgba(126,231,255,0.04),
      transparent 60%
    );

  animation:pulse 12s ease-in-out infinite;

}

@keyframes pulse{

  0%{ opacity:0.3; }
  50%{ opacity:0.6; }
  100%{ opacity:0.3; }

}

/* =========================
   PARTICULAS
========================= */

.particles{

  position:fixed;

  inset:0;

  pointer-events:none;

}

.particles span{

  position:absolute;

  width:2px;
  height:2px;

  background:white;

  border-radius:50%;

  opacity:0.08;

  animation:float linear infinite;

}

@keyframes float{

  from{
    transform:translateY(100vh);
  }

  to{
    transform:translateY(-120vh);
  }

}

/* =========================
   HEADER
========================= */

.header{

  position:absolute;

  top:20px;

  left:50%;

  transform:translateX(-50%);

  text-align:center;

  z-index:10;

}

.logo{

  letter-spacing:10px;

  font-size:11px;

  opacity:0.45;

  margin-bottom:12px;

}

h1{

  font-size:54px;

  font-weight:normal;

  margin-bottom:10px;

}

.sub{

  opacity:0.45;

  margin-bottom:22px;

}

.controls{

  display:flex;

  justify-content:center;

  gap:12px;

}

select,
button{

  background:transparent;

  border:
    1px solid rgba(255,255,255,0.15);

  color:white;

  padding:12px 18px;

  letter-spacing:2px;

  cursor:pointer;

}

button:hover{

  background:white;

  color:black;

}

/* =========================
   MESA
========================= */

.table-area{

  position:absolute;

  inset:0;

  display:flex;

  justify-content:center;

  align-items:center;

  padding-top:60px;

}

.table{

  position:relative;

  width:420px;
  height:420px;

  border-radius:50%;

  border:
    1px solid rgba(126,231,255,0.08);

  background:

    radial-gradient(
      circle at center,
      rgba(126,231,255,0.03),
      rgba(0,0,0,0.15)
    );

  box-shadow:
    0 0 80px rgba(126,231,255,0.04);

}

/* =========================
   CENTRO
========================= */

.center-info{

  position:absolute;

  left:50%;
  top:50%;

  transform:translate(-50%,-50%);

  text-align:center;

  width:260px;

}

.round-text{

  font-size:24px;

  margin-bottom:10px;

}

.phase-text{

  letter-spacing:3px;

  opacity:0.45;

  font-size:11px;

}

/* =========================
   JUGADORES
========================= */

.player{

  position:absolute;

  width:150px;

  text-align:center;

  transform:translate(-50%,-50%);

}

.player-name{

  letter-spacing:3px;

  font-size:11px;

  opacity:0.45;

  margin-bottom:6px;

}

.player-hp{

  font-size:22px;

  margin-bottom:10px;

}

.played-cards{

  display:flex;

  justify-content:center;

  gap:6px;

}

.slot{

  width:42px;
  height:62px;

  border:
    1px solid rgba(255,255,255,0.12);

  background:
    rgba(255,255,255,0.02);

  display:flex;

  justify-content:center;
  align-items:center;

  font-size:12px;

}

/* =========================
   POSICIONES
========================= */

.p1{
  left:50%;
  top:4%;
}

.p2{
  left:82%;
  top:28%;
}

.p3{
  left:78%;
  top:72%;
}

.p4{
  left:50%;
  top:95%;
}

.p5{
  left:22%;
  top:72%;
}

.p6{
  left:18%;
  top:28%;
}

.p7{
  left:50%;
  top:50%;
}

/* =========================
   KIT
========================= */

.player-hand{

  position:fixed;

  bottom:18px;

  left:50%;

  transform:translateX(-50%);

  width:420px;

  padding:20px;

  border-radius:26px;

  border:
    1px solid rgba(255,255,255,0.08);

  background:
    rgba(0,0,0,0.72);

  backdrop-filter:blur(10px);

  z-index:20;

}

.hand-title{

  text-align:center;

  margin-bottom:16px;

  letter-spacing:4px;

  font-size:11px;

  opacity:0.45;

}

.hand-section{

  display:flex;

  justify-content:center;

  gap:10px;

  margin-bottom:12px;

}

.card{

  width:64px;
  height:92px;

  border:
    1px solid rgba(255,255,255,0.14);

  background:
    rgba(255,255,255,0.02);

  display:flex;

  justify-content:center;
  align-items:center;

  cursor:pointer;

  transition:0.25s;

  user-select:none;

}

.card:hover{

  transform:
    translateY(-6px);

  border-color:#7ee7ff;

  box-shadow:
    0 0 18px rgba(126,231,255,0.15);

}

.card.used{

  opacity:0.18;

  pointer-events:none;

}

/* =========================
   ANALISIS
========================= */

.analysis{

  position:fixed;

  right:20px;

  top:50%;

  transform:translateY(-50%);

  width:320px;

  max-height:75vh;

  overflow:auto;

  padding:24px;

  border:
    1px solid rgba(255,255,255,0.08);

  background:
    rgba(0,0,0,0.72);

  backdrop-filter:blur(10px);

  z-index:20;

}

.analysis h2{

  font-size:12px;

  letter-spacing:4px;

  opacity:0.5;

  margin-bottom:18px;

}

.analysis p{

  line-height:1.8;

  margin-bottom:12px;

  opacity:0.82;

}

.highlight{

  font-size:22px;

}

/* =========================
   MOBILE
========================= */

@media(max-width:900px){

  .table{

    width:300px;
    height:300px;

  }

  h1{
    font-size:38px;
  }

  .player-hand{

    width:95%;

  }

  .analysis{

    display:none;

  }

}

</style>

</head>

<body>

<div class="particles" id="particles"></div>

<div class="header">

  <div class="logo">
    ARRECIFE
  </div>

  <h1>Simulación</h1>

  <div class="sub">
    Observá cómo se mueve el grupo.
  </div>

  <div class="controls">

    <select id="playerCount">

      <option value="3">3 jugadores</option>
      <option value="4">4 jugadores</option>
      <option value="5" selected>5 jugadores</option>
      <option value="6">6 jugadores</option>
      <option value="7">7 jugadores</option>

    </select>

    <button onclick="newGame()">
      NUEVA PARTIDA
    </button>

  </div>

</div>

<div class="table-area">

  <div class="table">

    <div class="center-info">

      <div class="round-text" id="roundText">
        RONDA 1
      </div>

      <div class="phase-text" id="phaseText">
        REVELACIÓN 1
      </div>

    </div>

    <div id="playersArea"></div>

  </div>

</div>

<div class="player-hand">

  <div class="hand-title">
    TU KIT
  </div>

  <div class="hand-section">

    <div class="card"
         onclick="playCard('equipo','Algas',this)">
      Algas
    </div>

    <div class="card"
         onclick="playCard('equipo','Corales',this)">
      Corales
    </div>

  </div>

  <div class="hand-section">

    <div class="card"
         onclick="playCard('signo','+',this)">
      +
    </div>

    <div class="card"
         onclick="playCard('signo','-',this)">
      −
    </div>

  </div>

  <div class="hand-section">

    <div class="card"
         onclick="playCard('valor',1,this)">
      1
    </div>

    <div class="card"
         onclick="playCard('valor',2,this)">
      2
    </div>

    <div class="card"
         onclick="playCard('valor',3,this)">
      3
    </div>

    <div class="card"
         onclick="playCard('valor',4,this)">
      4
    </div>

    <div class="card"
         onclick="playCard('valor',5,this)">
      5
    </div>

  </div>

  <button
    style="width:100%; margin-top:10px;"
    onclick="resolverRonda()"
    id="resolveBtn">

    RESOLVER RONDA

  </button>

</div>

<div class="analysis" id="analysis">

  <h2>ANÁLISIS</h2>

  <div id="analysisContent">

    Esperando resolución...

  </div>

</div>
