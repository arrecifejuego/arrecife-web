<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Simulación — Arrecife</title>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{

  background:#000;
  color:white;
  font-family:Arial,sans-serif;

  overflow:hidden;
  height:100vh;

}

/* =========================
   FONDO
========================= */

body::before{

  content:"";

  position:fixed;
  inset:0;

  background:
    radial-gradient(circle at center,
    rgba(126,231,255,0.04),
    transparent 60%);

  animation:pulse 12s ease-in-out infinite;

}

@keyframes pulse{

  0%{ opacity:0.3; }
  50%{ opacity:0.6; }
  100%{ opacity:0.3; }

}

/* =========================
   PARTICULAS
========================= */

.particles{

  position:fixed;
  inset:0;

  pointer-events:none;

}

.particles span{

  position:absolute;

  width:2px;
  height:2px;

  background:white;

  border-radius:50%;

  opacity:0.08;

  animation:float linear infinite;

}

@keyframes float{

  from{
    transform:translateY(100vh);
  }

  to{
    transform:translateY(-120vh);
  }

}

/* =========================
   UI SUPERIOR
========================= */

.top-ui{

  position:absolute;

  top:25px;
  left:50%;

  transform:translateX(-50%);

  text-align:center;

  z-index:10;

}

.logo{

  letter-spacing:10px;
  font-size:11px;

  opacity:0.5;

  margin-bottom:12px;

}

h1{

  font-size:56px;
  font-weight:normal;

  margin-bottom:10px;

}

.sub{

  opacity:0.4;

  margin-bottom:24px;

}

.controls{

  display:flex;

  justify-content:center;

  gap:12px;

  margin-bottom:12px;

}

select,
button{

  background:transparent;

  border:
    1px solid rgba(255,255,255,0.15);

  color:white;

  padding:12px 18px;

  letter-spacing:2px;

  cursor:pointer;

}

button:hover{

  background:white;
  color:black;

}

/* =========================
   MESA
========================= */

.table{

  position:absolute;

  left:50%;
  top:55%;

  transform:translate(-50%,-50%);

  width:520px;
  height:520px;

  border-radius:50%;

  border:
    1px solid rgba(126,231,255,0.08);

  box-shadow:
    0 0 60px rgba(126,231,255,0.05);

}

/* =========================
   JUGADORES
========================= */

.player{

  position:absolute;

  text-align:center;

  width:140px;

}

.player-name{

  letter-spacing:3px;

  font-size:12px;

  opacity:0.55;

  margin-bottom:10px;

}

.hp{

  font-size:30px;

  margin-bottom:12px;

}

.cards-on-table{

  display:flex;
  justify-content:center;
  gap:8px;

}

.mini-card{

  width:52px;
  height:72px;

  border:
    1px solid rgba(255,255,255,0.15);

  display:flex;
  justify-content:center;
  align-items:center;

  background:
    rgba(255,255,255,0.02);

  font-size:14px;

}

/* posiciones */

.p1{
  left:50%;
  top:120px;
  transform:translateX(-50%);
}

.p2{
  right:180px;
  top:310px;
}

.p3{
  right:260px;
  bottom:170px;
}

.p4{
  left:260px;
  bottom:170px;
}

.p5{
  left:180px;
  top:310px;
}

.p6{
  left:80px;
  top:50%;
  transform:translateY(-50%);
}

.p7{
  right:80px;
  top:50%;
  transform:translateY(-50%);
}

/* =========================
   KIT
========================= */

.player-hand{

  position:fixed;

  bottom:20px;
  left:50%;

  transform:translateX(-50%);

  z-index:20;

  display:flex;
  flex-direction:column;
  align-items:center;

  gap:14px;

  padding:20px 28px;

  border:
    1px solid rgba(255,255,255,0.06);

  background:
    rgba(0,0,0,0.45);

  backdrop-filter:blur(10px);

  border-radius:22px;

}

.hand-title{

  font-size:11px;

  letter-spacing:5px;

  opacity:0.45;

}

.hand-row{

  display:flex;
  gap:10px;

}

.card{

  width:70px;
  height:96px;

  border:
    1px solid rgba(255,255,255,0.12);

  display:flex;
  justify-content:center;
  align-items:center;

  background:
    rgba(255,255,255,0.02);

  cursor:pointer;

  transition:0.25s;

}

.card:hover{

  transform:
    translateY(-5px);

  border-color:
    rgba(126,231,255,0.45);

}

.card.used{

  opacity:0.15;

  pointer-events:none;

}

/* =========================
   RESULTADO
========================= */

.result{

  position:absolute;

  top:50%;
  left:50%;

  transform:translate(-50%,-50%);

  width:540px;

  background:
    rgba(0,0,0,0.75);

  border:
    1px solid rgba(255,255,255,0.08);

  padding:30px;

  backdrop-filter:blur(12px);

  opacity:0;
  pointer-events:none;

  transition:0.4s;

}

.result.show{

  opacity:1;
  pointer-events:auto;

}

.result h2{

  letter-spacing:4px;

  font-size:13px;

  opacity:0.5;

  margin-bottom:14px;

}

.result p{

  line-height:1.8;

  margin-bottom:12px;

}

.close-btn{

  margin-top:20px;

}

/* =========================
   MOBILE
========================= */

@media(max-width:900px){

  h1{
    font-size:40px;
  }

  .table{
    width:340px;
    height:340px;
  }

  .card{
    width:54px;
    height:82px;
  }

  .player-hand{

    width:95%;

    padding:12px;

  }

}

</style>

</head>

<body>

<div class="particles" id="particles"></div>

<div class="top-ui">

  <div class="logo">
    ARRECIFE
  </div>

  <h1>Simulación</h1>

  <div class="sub">
    Observá cómo se mueve el grupo.
  </div>

  <div class="controls">

    <select id="playerCount">

      <option value="3">3 jugadores</option>
      <option value="4">4 jugadores</option>
      <option value="5" selected>5 jugadores</option>
      <option value="6">6 jugadores</option>
      <option value="7">7 jugadores</option>

    </select>

    <button onclick="newGame()">
      NUEVA PARTIDA
    </button>

  </div>

  <div id="roundText">
    RONDA 1 — Revelación 1
  </div>

</div>

<div class="table"></div>

<div id="playersArea"></div>

<!-- KIT -->

<div class="player-hand">

  <div class="hand-title">
    TU KIT
  </div>

  <div class="hand-row">

    <div class="card"
         onclick="playCard('equipo','Algas',this)">
      Algas
    </div>

    <div class="card"
         onclick="playCard('equipo','Corales',this)">
      Corales
    </div>

  </div>

  <div class="hand-row">

    <div class="card"
         onclick="playCard('signo','+',this)">
      +
    </div>

    <div class="card"
         onclick="playCard('signo','-',this)">
      -
    </div>

  </div>

  <div class="hand-row">

    <div class="card"
         onclick="playCard('valor',1,this)">
      1
    </div>

    <div class="card"
         onclick="playCard('valor',2,this)">
      2
    </div>

    <div class="card"
         onclick="playCard('valor',3,this)">
      3
    </div>

    <div class="card"
         onclick="playCard('valor',4,this)">
      4
    </div>

    <div class="card"
         onclick="playCard('valor',5,this)">
      5
    </div>

  </div>

</div>

<!-- RESULTADO -->

<div class="result" id="result">

  <div id="resultContent"></div>

  <button class="close-btn"
          onclick="closeResult()">
    CONTINUAR
  </button>

</div>

<script>

/* =========================
   PARTICULAS
========================= */

const particles =
document.getElementById("particles");

for(let i=0;i<40;i++){

  const p =
    document.createElement("span");

  p.style.left =
    Math.random()*100 + "%";

  p.style.top =
    Math.random()*100 + "%";

  p.style.animationDuration =
    (20 + Math.random()*30) + "s";

  particles.appendChild(p);

}

/* =========================
   GAME
========================= */

let round = 1;

let reveal = 1;

let players = [];

let currentSelections = {};

function newGame(){

  round = 1;

  reveal = 1;

  const total =
    parseInt(
      document.getElementById("playerCount").value
    );

  players = [];

  for(let i=0;i<total;i++){

    players.push({

      hp:10,

      cards:[null,null,null]

    });

  }

  renderPlayers();

}

function renderPlayers(){

  const area =
    document.getElementById("playersArea");

  area.innerHTML = "";

  players.forEach((p,index)=>{

    const div =
      document.createElement("div");

    div.className =
      "player p" + (index+1);

    div.innerHTML = `

      <div class="player-name">
        JUGADOR ${index+1}
      </div>

      <div class="hp">
        ${p.hp} HP
      </div>

      <div class="cards-on-table">

        ${p.cards.map(c=>`

          <div class="mini-card">
            ${c || ""}
          </div>

        `).join("")}

      </div>

    `;

    area.appendChild(div);

  });

}

function playCard(tipo,valor,el){

  if(currentSelections[tipo]) return;

  currentSelections[tipo] = valor;

  el.classList.add("used");

  const me = players[0];

  me.cards[reveal-1] = valor;

  renderPlayers();

  if(
    currentSelections.equipo &&
    currentSelections.signo &&
    currentSelections.valor
  ){

    botsPlay();

  }

}

function botsPlay(){

  for(let i=1;i<players.length;i++){

    players[i].cards[reveal-1] =
      randomCard();

  }

  renderPlayers();

  reveal++;

  currentSelections = {};

  resetHand();

  if(reveal > 3){

    showResolution();

  }else{

    updateRoundText();

  }

}

function randomCard(){

  const all = [
    "Algas",
    "Corales",
    "+",
    "-",
    1,2,3,4,5
  ];

  return all[
    Math.floor(Math.random()*all.length)
  ];

}

function updateRoundText(){

  document.getElementById("roundText")
  .innerHTML =
    `RONDA ${round} — Revelación ${reveal}`;

}

function resetHand(){

  document
    .querySelectorAll(".card")
    .forEach(c=>{

      c.classList.remove("used");

    });

}

function showResolution(){

  const result =
    document.getElementById("result");

  document.getElementById(
    "resultContent"
  ).innerHTML = `

    <h2>ANÁLISIS</h2>

    <p>
      La ronda fue observada.
    </p>

    <p>
      Las corrientes comienzan a moverse.
    </p>

    <p>
      El daño fue aplicado.
    </p>

  `;

  result.classList.add("show");

}

function closeResult(){

  document
    .getElementById("result")
    .classList.remove("show");

  players.forEach(p=>{

    p.cards = [null,null,null];

  });

  reveal = 1;

  round++;

  updateRoundText();

  renderPlayers();

}

newGame();

</script>

</body>
</html>
