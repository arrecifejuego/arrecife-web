<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Arrecife — Simulación</title>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  background:#000;
  color:white;
  font-family:Arial, sans-serif;
  overflow:hidden;
}

/* =========================
   FONDO
========================= */

body::before{
  content:"";
  position:fixed;
  inset:0;

  background:
    radial-gradient(circle at center,
    rgba(126,231,255,0.06),
    transparent 60%);

  animation:pulse 10s ease-in-out infinite;
}

@keyframes pulse{

  0%{ opacity:0.4; }
  50%{ opacity:0.8; }
  100%{ opacity:0.4; }

}

.particles{
  position:fixed;
  inset:0;
  pointer-events:none;
  overflow:hidden;
}

.particles span{

  position:absolute;

  width:2px;
  height:2px;

  background:white;

  border-radius:50%;

  opacity:0.08;

  animation:float linear infinite;

}

@keyframes float{

  from{
    transform:translateY(100vh);
  }

  to{
    transform:translateY(-120vh);
  }

}

/* =========================
   UI
========================= */

.ui{
  position:relative;
  z-index:5;
  padding:30px;
}

.logo{
  text-align:center;
  font-size:11px;
  letter-spacing:8px;
  opacity:0.5;
  margin-bottom:15px;
}

.titulo{
  text-align:center;
  font-size:34px;
  font-weight:normal;
  margin-bottom:10px;
}

.sub{
  text-align:center;
  opacity:0.45;
  margin-bottom:35px;
  font-size:13px;
}

.top-controls{
  display:flex;
  justify-content:center;
  gap:15px;
  margin-bottom:20px;
}

select,
button{

  background:transparent;

  border:1px solid rgba(255,255,255,0.15);

  color:white;

  padding:12px 20px;

  letter-spacing:2px;

  font-size:12px;

  transition:0.3s;

}

button{
  cursor:pointer;
}

button:hover,
select:hover{

  border-color:#7ee7ff;

  box-shadow:
    0 0 20px rgba(126,231,255,0.18);

}

/* =========================
   INFO
========================= */

.estado{
  text-align:center;
  margin-bottom:15px;
  opacity:0.65;
  letter-spacing:2px;
  font-size:12px;
}

.hp-panel{

  display:flex;

  justify-content:center;

  gap:14px;

  flex-wrap:wrap;

  margin-bottom:20px;

}

.hp{

  border:1px solid rgba(255,255,255,0.1);

  padding:10px 14px;

  min-width:90px;

  text-align:center;

  background:rgba(255,255,255,0.03);

  backdrop-filter:blur(5px);

}

.hp.dead{
  opacity:0.25;
}

/* =========================
   MESA
========================= */

.table-area{

  position:relative;

  width:100%;

  height:560px;

}

.table{

  position:absolute;

  left:50%;
  top:50%;

  transform:translate(-50%, -50%);

  width:520px;
  height:520px;

  border-radius:50%;

  border:
    1px solid rgba(126,231,255,0.10);

  box-shadow:
    0 0 40px rgba(126,231,255,0.05);

}

.player{

  position:absolute;

  width:170px;

  transform:
    translate(-50%, -50%);

  text-align:center;

}

.player-name{

  margin-bottom:10px;

  font-size:12px;

  letter-spacing:2px;

  opacity:0.6;

}

.slots{

  display:flex;

  justify-content:center;

  gap:8px;

  margin-bottom:14px;

  min-height:76px;

}

.slot{

  width:50px;
  height:72px;

  border:
    1px solid rgba(255,255,255,0.12);

  background:
    rgba(255,255,255,0.03);

  display:flex;

  align-items:center;
  justify-content:center;

  font-size:11px;

  letter-spacing:1px;

  opacity:0.8;

}

/* =========================
   MANO
========================= */

.hand{

  display:flex;

  justify-content:center;

  gap:8px;

  flex-wrap:wrap;

}

.card{

  width:52px;
  height:72px;

  border:
    1px solid rgba(255,255,255,0.15);

  display:flex;

  align-items:center;
  justify-content:center;

  cursor:pointer;

  transition:0.25s;

  background:
    rgba(255,255,255,0.03);

  font-size:12px;

  letter-spacing:1px;

}

.card:hover{

  transform:translateY(-4px);

  border-color:#7ee7ff;

  box-shadow:
    0 0 18px rgba(126,231,255,0.2);

}

.card.used{

  opacity:0.2;

  pointer-events:none;

}

/* =========================
   BOTON
========================= */

.center{
  text-align:center;
}

#resolveBtn{
  margin-top:25px;
}

/* =========================
   RESULTADO
========================= */

.resultado{

  max-width:700px;

  margin:35px auto 0;

  border-top:
    1px solid rgba(255,255,255,0.08);

  padding-top:35px;

}

.bloque{
  margin-bottom:28px;
}

.bloque h2{

  font-size:12px;

  letter-spacing:4px;

  opacity:0.45;

  margin-bottom:10px;

  font-weight:normal;

}

.bloque p{

  line-height:1.8;

  font-size:18px;

}

.paso{

  opacity:0.75;

  margin-bottom:14px;

  line-height:1.8;

}

.evento{

  margin-top:20px;

  margin-bottom:24px;

  padding:18px;

  border:
    1px solid rgba(126,231,255,0.18);

  background:
    rgba(126,231,255,0.04);

  box-shadow:
    0 0 24px rgba(126,231,255,0.08);

}

.highlight{
  font-size:26px;
}

/* =========================
   MOBILE
========================= */

@media(max-width:900px){

  .table{
    width:420px;
    height:420px;
  }

  .player{
    width:140px;
  }

  .slots{
    gap:5px;
  }

  .slot{
    width:42px;
    height:64px;
    font-size:10px;
  }

  .card{
    width:46px;
    height:66px;
  }

}

</style>

</head>

<body>

<div class="particles" id="particles"></div>

<div class="ui">

  <div class="logo">
    ARRECIFE
  </div>

  <div class="titulo">
    Simulación
  </div>

  <div class="sub">
    Observá cómo se mueve el grupo.
  </div>

  <div class="top-controls">

    <select id="playerCount">

      <option value="3">3 jugadores</option>
      <option value="4">4 jugadores</option>
      <option value="5" selected>5 jugadores</option>
      <option value="6">6 jugadores</option>
      <option value="7">7 jugadores</option>

    </select>

    <button onclick="startGame()">
      NUEVA PARTIDA
    </button>

  </div>

  <div class="estado" id="roundInfo">
    RONDA 1 — Revelación 1
  </div>

  <div class="hp-panel" id="hpPanel"></div>

  <div class="table-area">

    <div class="table"></div>

    <div id="playersContainer"></div>

  </div>

  <div class="center">

    <button id="resolveBtn" onclick="resolveRound()" style="display:none;">
      RESOLVER RONDA
    </button>

  </div>

  <div class="resultado" id="resultado"></div>

</div>

<script>

/* =========================
   PARTICULAS
========================= */

const particles =
document.getElementById("particles");

for(let i=0;i<55;i++){

  const p =
    document.createElement("span");

  p.style.left =
    Math.random()*100 + "%";

  p.style.top =
    Math.random()*100 + "%";

  p.style.animationDuration =
    (20 + Math.random()*40) + "s";

  p.style.animationDelay =
    (-Math.random()*40) + "s";

  particles.appendChild(p);

}

/* =========================
   ESTADO
========================= */

let players = [];

let round = 1;

let reveal = 1;

let currentPlayer = 0;

const TEAM_CARDS =
["Algas","Corales"];

const SIGN_CARDS =
["+","-"];

const VALUE_CARDS =
["1","2","3","4","5"];

/* =========================
   START
========================= */

function startGame(){

  const count =
    parseInt(
      document.getElementById("playerCount").value
    );

  players = [];

  for(let i=0;i<count;i++){

    players.push({

      id:i,

      hp:10,

      alive:true,

      slots:["","",""],

      used:[]

    });

  }

  round = 1;
  reveal = 1;
  currentPlayer = 0;

  document.getElementById("resultado").innerHTML = "";

  updateHP();
  renderPlayers();
  updateInfo();

}

/* =========================
   HP
========================= */

function updateHP(){

  const panel =
    document.getElementById("hpPanel");

  panel.innerHTML = "";

  players.forEach((p,i)=>{

    const div =
      document.createElement("div");

    div.className =
      "hp" + (!p.alive ? " dead" : "");

    div.innerHTML = `

      J${i+1}
      <br><br>
      ${p.hp} HP

    `;

    panel.appendChild(div);

  });

}

/* =========================
   INFO
========================= */

function updateInfo(){

  document.getElementById("roundInfo").innerHTML =

    `RONDA ${round}
    — Revelación ${reveal}`;

}

/* =========================
   RENDER
========================= */

function renderPlayers(){

  const container =
    document.getElementById("playersContainer");

  container.innerHTML = "";

  const alivePlayers =
    players.filter(p=>p.alive);

  const total =
    alivePlayers.length;

  const radius = 205;

  alivePlayers.forEach((p,index)=>{

    const angle =
      (Math.PI*2/total)*index
      - Math.PI/2;

    const x =
      50 + Math.cos(angle)*32;

    const y =
      50 + Math.sin(angle)*32;

    const div =
      document.createElement("div");

    div.className = "player";

    div.style.left = x + "%";
    div.style.top = y + "%";

    div.innerHTML = `

      <div class="player-name">
        JUGADOR ${p.id+1}
      </div>

      <div class="slots">

        <div class="slot">
          ${p.slots[0]}
        </div>

        <div class="slot">
          ${p.slots[1]}
        </div>

        <div class="slot">
          ${p.slots[2]}
        </div>

      </div>

      ${
        p.id === currentPlayer
        ? renderHand(p)
        : ""
      }

    `;

    container.appendChild(div);

  });

}

/* =========================
   MANO
========================= */

function renderHand(player){

  const available = [

    ...TEAM_CARDS,
    ...SIGN_CARDS,
    ...VALUE_CARDS

  ].filter(card=>
    !player.used.includes(card)
  );

  return `

    <div class="hand">

      ${available.map(card=>`

        <div
          class="card"
          onclick="playCard('${card}')"
        >
          ${card}
        </div>

      `).join("")}

    </div>

  `;

}

/* =========================
   JUGAR
========================= */

function playCard(card){

  const player =
    players[currentPlayer];

  player.slots[reveal-1] = card;

  player.used.push(card);

  nextPlayer();

}

/* =========================
   NEXT
========================= */

function nextPlayer(){

  const alive =
    players.filter(p=>p.alive);

  const currentAliveIndex =
    alive.findIndex(
      p=>p.id === currentPlayer
    );

  if(currentAliveIndex < alive.length-1){

    currentPlayer =
      alive[currentAliveIndex+1].id;

  }else{

    if(reveal < 3){

      reveal++;

      currentPlayer =
        alive[0].id;

    }else{

      document.getElementById(
        "resolveBtn"
      ).style.display = "inline-block";

    }

  }

  updateInfo();
  renderPlayers();

}

/* =========================
   RESOLVER
========================= */

function resolveRound(){

  const alive =
    players.filter(p=>p.alive);

  const parsed = alive.map(p=>{

    let equipo =
      p.slots.find(s=>
        s==="Algas" || s==="Corales"
      );

    let signo =
      p.slots.find(s=>
        s==="+" || s==="-"
      );

    let valor =
      parseInt(
        p.slots.find(s=>
          ["1","2","3","4","5"]
          .includes(s)
        )
      );

    return{

      player:p,

      equipo,
      signo,
      valor,

      aporte:
        signo === "+"
        ? valor
        : -valor

    };

  });

  const algas =
    parsed.filter(p=>p.equipo==="Algas");

  const corales =
    parsed.filter(p=>p.equipo==="Corales");

  if(
    algas.length === 0 ||
    corales.length === 0
  ){

    document.getElementById("resultado")
    .innerHTML = `

      <div class="evento">
        Todos eligieron el mismo equipo.
        <br><br>
        La ronda se reinicia.
      </div>

    `;

    resetRound();
    return;

  }

  let mayoria;
  let minoria;

  if(algas.length > corales.length){

    mayoria = algas;
    minoria = corales;

  }else{

    mayoria = corales;
    minoria = algas;

  }

  const sumaMayoriaReal =
    mayoria.reduce(
      (a,b)=>a+b.aporte,0
    );

  const sumaMinoriaReal =
    minoria.reduce(
      (a,b)=>a+b.aporte,0
    );

  const sumaMayoria =
    Math.abs(sumaMayoriaReal);

  const sumaMinoria =
    Math.abs(sumaMinoriaReal);

  let dañoBase =
    sumaMayoria > alive.length
    ? "Mayoría"
    : "Minoría";

  let tornado = false;

  let dañoFinal = dañoBase;

  if(sumaMinoria > sumaMayoria){

    tornado = true;

    dañoFinal =
      dañoBase === "Mayoría"
      ? "Minoría"
      : "Mayoría";

  }

  let html = `

    <div class="bloque">

      <h2>MAYORÍA</h2>

      <p>
        ${mayoria[0].equipo}
        — ${mayoria.length} jugadores
      </p>

    </div>

    <div class="bloque">

      <h2>MINORÍA</h2>

      <p>
        ${minoria[0].equipo}
        — ${minoria.length} jugadores
      </p>

    </div>

    <div class="bloque">

      <h2>SUMA MAYORÍA</h2>

      <p class="highlight">
        ${sumaMayoriaReal}
      </p>

    </div>

    <div class="bloque">

      <h2>SUMA MINORÍA</h2>

      <p class="highlight">
        ${sumaMinoriaReal}
      </p>

    </div>

    <div class="bloque">

      <h2>ANÁLISIS</h2>

      <div class="paso">
        Hay ${alive.length}
        jugadores vivos.
      </div>

      <div class="paso">
        La suma de la Mayoría
        es ${sumaMayoria}.
      </div>

  `;

  if(sumaMayoria > alive.length){

    html += `

      <div class="paso">
        ${sumaMayoria}
        supera la cantidad de jugadores vivos.
      </div>

    `;

  }else{

    html += `

      <div class="paso">
        ${sumaMayoria}
        es menor o igual
        a la cantidad de jugadores vivos.
      </div>

    `;

  }

  if(sumaMayoria !== 0){

    html += `

      <div class="paso">
        El daño inicialmente iría
        hacia la ${dañoBase}.
      </div>

    `;

  }

  if(tornado && sumaMayoria !== 0){

    html += `

      <div class="evento">

        TORNADO ACTIVADO
        <br><br>

        La Minoría altera el resultado.

      </div>

    `;

  }

  if(sumaMayoria === 0){

    html += `

      <div class="evento">

        MAREA ACTIVADA
        <br><br>

        La Minoría recupera 2 HP.

      </div>

    `;

  }

  html += `</div>`;

  if(sumaMayoria === 0){

    minoria.forEach(p=>{

      p.player.hp =
        Math.min(
          10,
          p.player.hp + 2
        );

    });

  }else{

    const target =
      dañoFinal === "Mayoría"
      ? mayoria
      : minoria;

    target.forEach(p=>{

      p.player.hp -= sumaMayoria;

      if(p.player.hp <= 0){

        p.player.hp = 0;
        p.player.alive = false;

      }

    });

  }

  html += `

    <div class="bloque">

      <h2>RESULTADO FINAL</h2>

      <p class="highlight">

        ${
          sumaMayoria === 0
          ? "La Minoría recupera 2 HP."
          : `La ${dañoFinal}
             recibe ${sumaMayoria}
             de daño.`
        }

      </p>

    </div>

  `;

  document.getElementById("resultado")
  .innerHTML = html;

  updateHP();

  const remaining =
    players.filter(p=>p.alive);

  if(remaining.length <= 2){

    setTimeout(()=>{

      document.getElementById(
        "resultado"
      ).innerHTML += `

        <div class="evento">

          SIMULACIÓN FINALIZADA
          <br><br>

          El mar queda en silencio.

        </div>

      `;

    },700);

    return;

  }

  setTimeout(()=>{

    resetRound();

  },3000);

}

/* =========================
   RESET
========================= */

function resetRound(){

  players.forEach(p=>{

    p.slots = ["","",""];
    p.used = [];

  });

  reveal = 1;

  round++;

  currentPlayer =
    players.find(p=>p.alive).id;

  document.getElementById(
    "resolveBtn"
  ).style.display = "none";

  updateInfo();
  renderPlayers();

}

/* =========================
   INIT
========================= */

startGame();

</script>

</body>
</html>
