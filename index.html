<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Arrecife — Simulación</title>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

html,body{
  width:100%;
  min-height:100%;
}

body{
  background:#000;
  color:white;
  font-family:Arial,sans-serif;
  overflow-x:hidden;
  min-height:100vh;
}

/* =========================
   FONDO
========================= */

body::before{
  content:"";
  position:fixed;
  inset:0;

  background:
    radial-gradient(circle at center,
    rgba(126,231,255,0.05),
    transparent 60%);

  animation:pulse 12s ease-in-out infinite;

  pointer-events:none;
}

@keyframes pulse{

  0%{
    transform:scale(1);
    opacity:0.5;
  }

  50%{
    transform:scale(1.1);
    opacity:0.8;
  }

  100%{
    transform:scale(1);
    opacity:0.5;
  }

}

.ocean{
  position:fixed;
  inset:0;
  overflow:hidden;
  z-index:0;
  pointer-events:none;
}

.wave{

  position:absolute;

  width:200%;
  height:200%;

  left:-50%;
  top:-50%;

  background:
    radial-gradient(
      circle at center,
      rgba(126,231,255,0.04),
      transparent 60%
    );

  animation:rotateWave 45s linear infinite;

}

.wave2{
  animation-duration:70s;
  opacity:0.4;
}

.wave3{
  animation-duration:100s;
  opacity:0.2;
}

@keyframes rotateWave{

  from{
    transform:rotate(0deg);
  }

  to{
    transform:rotate(360deg);
  }

}

/* =========================
   CONTAINER
========================= */

.container{
  position:relative;
  z-index:2;
  width:100%;
  max-width:1400px;
  margin:auto;
  padding:40px 20px 60px;
}

/* =========================
   HEADER
========================= */

.header{
  text-align:center;
  margin-bottom:30px;
}

.logo{
  letter-spacing:10px;
  font-size:11px;
  opacity:0.5;
  margin-bottom:18px;
}

h1{
  font-size:42px;
  font-weight:normal;
  margin-bottom:10px;
}

.sub{
  opacity:0.45;
  font-size:14px;
  line-height:1.7;
}

/* =========================
   CONTROLES
========================= */

.controls{
  text-align:center;
  margin-bottom:25px;
}

select{

  appearance:none;
  background:#050505;

  color:white;

  border:
    1px solid rgba(255,255,255,0.15);

  padding:12px 20px;

  font-size:14px;

  cursor:pointer;

  transition:0.3s;

}

select:hover{

  border-color:#7ee7ff;

  box-shadow:
    0 0 18px rgba(126,231,255,0.25);

}

/* =========================
   MESA
========================= */

.mesa-wrapper{

  width:100%;

  display:flex;

  justify-content:center;

  align-items:center;

  margin-top:20px;
  margin-bottom:40px;

}

.mesa{

  width:650px;
  height:650px;

  max-width:90vw;
  max-height:90vw;

  border-radius:50%;

  position:relative;

  background:
    radial-gradient(
      circle at center,
      rgba(126,231,255,0.06),
      rgba(255,255,255,0.01)
    );

  border:
    1px solid rgba(255,255,255,0.06);

  box-shadow:
    inset 0 0 80px rgba(126,231,255,0.04),
    0 0 60px rgba(126,231,255,0.05);

}

/* =========================
   JUGADORES
========================= */

.player{

  position:absolute;

  width:150px;

  transform:
    translate(-50%,-50%);

  text-align:center;

}

.player-name{

  font-size:12px;

  letter-spacing:2px;

  margin-bottom:8px;

  opacity:0.55;

}

.hp{

  font-size:13px;

  opacity:0.7;

  margin-bottom:10px;

}

.card-row{

  display:flex;

  justify-content:center;

  gap:6px;

}

.card{

  width:42px;
  height:62px;

  border:
    1px solid rgba(255,255,255,0.12);

  background:
    rgba(255,255,255,0.03);

  display:flex;

  align-items:center;
  justify-content:center;

  font-size:11px;

  letter-spacing:1px;

  backdrop-filter:blur(4px);

  transition:0.3s;

}

.card.revealed{

  border-color:
    rgba(126,231,255,0.35);

  box-shadow:
    0 0 20px rgba(126,231,255,0.15);

}

/* =========================
   ZONA INFERIOR
========================= */

.bottom-ui{

  width:100%;

  max-width:1000px;

  margin:auto;
}

.tu-zona{

  border:
    1px solid rgba(255,255,255,0.08);

  background:
    rgba(255,255,255,0.02);

  padding:30px;

  margin-bottom:40px;

  backdrop-filter:blur(6px);

}

.kit-titulo{

  text-align:center;

  letter-spacing:4px;

  font-size:12px;

  opacity:0.55;

  margin-bottom:25px;

}

.cartas-grid{

  display:grid;

  grid-template-columns:
    repeat(auto-fit,minmax(220px,1fr));

  gap:20px;

}

.grupo{

  border:
    1px solid rgba(255,255,255,0.06);

  padding:18px;

  background:
    rgba(255,255,255,0.02);

}

.grupo-label{

  font-size:11px;

  letter-spacing:3px;

  opacity:0.4;

  margin-bottom:15px;

}

.valores{
  display:flex;
  flex-wrap:wrap;
  gap:8px;
}

.carta-btn{

  background:transparent;

  border:
    1px solid rgba(255,255,255,0.12);

  color:white;

  padding:10px 14px;

  cursor:pointer;

  transition:0.3s;

  margin:4px;

}

.carta-btn:hover{

  border-color:#7ee7ff;

  color:#7ee7ff;

  box-shadow:
    0 0 15px rgba(126,231,255,0.15);

}

.seleccion-actual{

  text-align:center;

  margin-bottom:25px;

  opacity:0.65;

  line-height:1.8;

}

/* =========================
   BOTON
========================= */

#resolverBtn{

  display:block;

  margin:30px auto 0;

  background:transparent;

  color:white;

  border:
    1px solid rgba(255,255,255,0.2);

  padding:16px 40px;

  letter-spacing:4px;

  cursor:pointer;

  transition:0.3s;

}

#resolverBtn:hover{

  background:#7ee7ff;

  color:black;

}

/* =========================
   RESULTADO
========================= */

.resultado{

  border-top:
    1px solid rgba(255,255,255,0.08);

  padding-top:40px;

}

.bloque{
  margin-bottom:35px;
}

.bloque h2{

  font-size:12px;

  letter-spacing:4px;

  opacity:0.5;

  margin-bottom:14px;

  font-weight:normal;

}

.highlight{

  font-size:26px;

  line-height:1.7;

}

.paso{

  margin-bottom:14px;

  opacity:0.72;

  line-height:1.8;

}

.evento{

  margin-top:20px;
  margin-bottom:35px;

  padding:18px;

  border:
    1px solid rgba(126,231,255,0.16);

  background:
    rgba(126,231,255,0.04);

  box-shadow:
    0 0 30px rgba(126,231,255,0.06);

  line-height:1.8;

}

/* =========================
   MOBILE
========================= */

@media(max-width:800px){

  .mesa{
    width:92vw;
    height:92vw;
  }

  .player{
    width:110px;
  }

  .card{
    width:32px;
    height:50px;
    font-size:9px;
  }

}

</style>

</head>

<body>

<div class="ocean">

  <div class="wave"></div>
  <div class="wave wave2"></div>
  <div class="wave wave3"></div>

</div>

<div class="container">

  <div class="header">

    <div class="logo">
      ARRECIFE
    </div>

    <h1>Simulación</h1>

    <div class="sub">
      Observá cómo se mueve el grupo.
    </div>

  </div>

  <div class="controls">

    <select id="cantidadJugadores">

      <option value="3">3 jugadores</option>
      <option value="4">4 jugadores</option>
      <option value="5" selected>5 jugadores</option>
      <option value="6">6 jugadores</option>
      <option value="7">7 jugadores</option>

    </select>

  </div>

  <div class="mesa-wrapper">

    <div class="mesa" id="mesa"></div>

  </div>

  <div class="bottom-ui">

    <div class="tu-zona">

      <div class="kit-titulo">
        TU KIT
      </div>

      <div class="seleccion-actual" id="seleccionActual">
        Elegí una carta.
      </div>

      <div class="cartas-grid">

        <div class="grupo">

          <div class="grupo-label">
            EQUIPO
          </div>

          <button class="carta-btn"
          onclick="elegirCarta('equipo','Algas')">
            Algas
          </button>

          <button class="carta-btn"
          onclick="elegirCarta('equipo','Corales')">
            Corales
          </button>

        </div>

        <div class="grupo">

          <div class="grupo-label">
            SIGNO
          </div>

          <button class="carta-btn"
          onclick="elegirCarta('signo','+')">
            +
          </button>

          <button class="carta-btn"
          onclick="elegirCarta('signo','-')">
            -
          </button>

        </div>

        <div class="grupo">

          <div class="grupo-label">
            VALOR
          </div>

          <div class="valores">

            <button class="carta-btn"
            onclick="elegirCarta('valor',1)">1</button>

            <button class="carta-btn"
            onclick="elegirCarta('valor',2)">2</button>

            <button class="carta-btn"
            onclick="elegirCarta('valor',3)">3</button>

            <button class="carta-btn"
            onclick="elegirCarta('valor',4)">4</button>

            <button class="carta-btn"
            onclick="elegirCarta('valor',5)">5</button>

          </div>

        </div>

      </div>

      <button id="resolverBtn"
      onclick="resolverRonda()">

        RESOLVER RONDA

      </button>

    </div>

    <div class="resultado" id="resultado"></div>

  </div>

</div>

<script>

let cantidadJugadores = 5;

let jugadores = [];

let seleccionJugador = {};

document.getElementById(
  "cantidadJugadores"
).addEventListener("change", e=>{

  cantidadJugadores =
    parseInt(e.target.value);

  iniciar();

});

function iniciar(){

  jugadores = [];

  for(let i=0;i<cantidadJugadores;i++){

    jugadores.push({

      nombre:
        i===0
        ? "VOS"
        : "BOT " + i,

      hp:10,

      equipo:null,
      signo:null,
      valor:null

    });

  }

  renderMesa();

}

function renderMesa(){

  const mesa =
    document.getElementById("mesa");

  mesa.innerHTML = "";

  const radius = 250;

  jugadores.forEach((j,index)=>{

    const angle =
      (Math.PI*2 / jugadores.length)
      * index
      - Math.PI/2;

    const x =
      325 + Math.cos(angle)*radius;

    const y =
      325 + Math.sin(angle)*radius;

    const div =
      document.createElement("div");

    div.className = "player";

    div.style.left = x + "px";
    div.style.top = y + "px";

    div.innerHTML = `

      <div class="player-name">
        ${j.nombre}
      </div>

      <div class="hp">
        ${j.hp} HP
      </div>

      <div class="card-row">

        <div class="card revealed">
          ${j.equipo || "?"}
        </div>

        <div class="card revealed">
          ${j.signo || "?"}
        </div>

        <div class="card revealed">
          ${j.valor || "?"}
        </div>

      </div>

    `;

    mesa.appendChild(div);

  });

}

function elegirCarta(tipo,valor){

  seleccionJugador[tipo] = valor;

  document.getElementById(
    "seleccionActual"
  ).innerHTML = `

    Equipo:
    ${seleccionJugador.equipo || "?"}

    <br>

    Signo:
    ${seleccionJugador.signo || "?"}

    <br>

    Valor:
    ${seleccionJugador.valor || "?"}

  `;

}

function resolverRonda(){

  if(
    !seleccionJugador.equipo ||
    !seleccionJugador.signo ||
    !seleccionJugador.valor
  ){

    alert(
      "Tenés que elegir las 3 cartas."
    );

    return;

  }

  jugadores[0] = {

    ...jugadores[0],

    ...seleccionJugador

  };

  for(let i=1;i<jugadores.length;i++){

    jugadores[i].equipo =
      Math.random() > 0.5
      ? "Algas"
      : "Corales";

    jugadores[i].signo =
      Math.random() > 0.5
      ? "+"
      : "-";

    jugadores[i].valor =
      Math.floor(Math.random()*5)+1;

  }

  renderMesa();

  analizar();

}

function analizar(){

  const vivos =
    jugadores.filter(j=>j.hp>0);

  const algas =
    vivos.filter(j=>j.equipo==="Algas");

  const corales =
    vivos.filter(j=>j.equipo==="Corales");

  if(
    algas.length===0 ||
    corales.length===0
  ){

    document.getElementById(
      "resultado"
    ).innerHTML = `

      <div class="evento">

        Todos eligieron el mismo equipo.
        <br>
        La ronda se reinicia.

      </div>

    `;

    resetRonda();

    return;

  }

  let mayoria;
  let minoria;

  if(algas.length > corales.length){

    mayoria = algas;
    minoria = corales;

  }else{

    mayoria = corales;
    minoria = algas;

  }

  const sumaMayoriaReal =
    mayoria.reduce((a,b)=>{

      return a +
      (
        b.signo === "+"
        ? b.valor
        : -b.valor
      );

    },0);

  const sumaMinoriaReal =
    minoria.reduce((a,b)=>{

      return a +
      (
        b.signo === "+"
        ? b.valor
        : -b.valor
      );

    },0);

  const sumaMayoria =
    Math.abs(sumaMayoriaReal);

  const sumaMinoria =
    Math.abs(sumaMinoriaReal);

  let dañoBase;

  if(sumaMayoria > vivos.length){

    dañoBase = "Mayoría";

  }else{

    dañoBase = "Minoría";

  }

  let tornado = false;

  let dañoFinal = dañoBase;

  if(sumaMinoria > sumaMayoria){

    tornado = true;

    dañoFinal =
      dañoBase === "Mayoría"
      ? "Minoría"
      : "Mayoría";

  }

  let html = `

    <div class="bloque">

      <h2>ANÁLISIS</h2>

      <div class="paso">
        Hay ${vivos.length} jugadores vivos.
      </div>

      <div class="paso">
        Suma Mayoría:
        ${sumaMayoriaReal}
      </div>

      <div class="paso">
        Suma Minoría:
        ${sumaMinoriaReal}
      </div>

    </div>

  `;

  if(tornado){

    html += `

      <div class="evento">

        TORNADO ACTIVADO
        <br><br>

        La Minoría altera el resultado.

      </div>

    `;

  }

  if(sumaMayoria === 0){

    html += `

      <div class="evento">

        MAREA ACTIVADA
        <br><br>

        La Minoría recupera 2 HP.

      </div>

    `;

    minoria.forEach(j=>{

      j.hp =
        Math.min(10,j.hp+2);

    });

  }else{

    const objetivo =
      dañoFinal === "Mayoría"
      ? mayoria
      : minoria;

    objetivo.forEach(j=>{

      j.hp -= sumaMayoria;

    });

    html += `

      <div class="bloque">

        <h2>RESULTADO FINAL</h2>

        <p class="highlight">

          La ${dañoFinal}
          recibe
          ${sumaMayoria}
          de daño.

        </p>

      </div>

    `;

  }

  document.getElementById(
    "resultado"
  ).innerHTML = html;

  jugadores =
    jugadores.filter(j=>j.hp>0);

  if(jugadores.length <= 2){

    document.getElementById(
      "resultado"
    ).innerHTML += `

      <div class="evento">

        SIMULACIÓN FINALIZADA

      </div>

    `;

    return;

  }

  setTimeout(()=>{

    resetRonda();

    renderMesa();

  },1500);

}

function resetRonda(){

  seleccionJugador = {};

  jugadores.forEach(j=>{

    j.equipo = null;
    j.signo = null;
    j.valor = null;

  });

  document.getElementById(
    "seleccionActual"
  ).innerHTML = `
    Elegí una carta.
  `;

}

iniciar();

</script>

</body>
</html>
