<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Arrecife — Simulación Viva</title>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

html,body{
  width:100%;
  height:100%;
  overflow:hidden;
  background:#000;
  font-family:Arial,sans-serif;
  color:white;
}

/* =========================
   FONDO
========================= */

body::before{
  content:"";
  position:fixed;
  inset:0;

  background:
    radial-gradient(
      circle at center,
      rgba(126,231,255,0.06),
      transparent 65%
    );

  animation:breath 8s ease-in-out infinite;
}

@keyframes breath{

  0%{ opacity:0.35; }
  50%{ opacity:0.7; }
  100%{ opacity:0.35; }

}

.particles{
  position:fixed;
  inset:0;
  pointer-events:none;
  overflow:hidden;
}

.particles span{

  position:absolute;

  width:2px;
  height:2px;

  background:white;

  border-radius:50%;

  opacity:0.08;

  animation:float linear infinite;

}

@keyframes float{

  from{
    transform:translateY(100vh);
  }

  to{
    transform:translateY(-120vh);
  }

}

/* =========================
   MESA
========================= */

.table{

  position:relative;

  width:100%;
  height:100%;

  display:flex;
  justify-content:center;
  align-items:center;

}

.center{

  position:absolute;

  width:420px;
  height:420px;

  border-radius:50%;

  border:
    1px solid rgba(126,231,255,0.08);

  box-shadow:
    0 0 60px rgba(126,231,255,0.05);

}

/* =========================
   JUGADORES
========================= */

.player{

  position:absolute;

  width:170px;

  text-align:center;

  transition:0.4s;

}

.player-name{

  letter-spacing:3px;

  font-size:11px;

  opacity:0.65;

  margin-bottom:10px;

}

.hp{

  font-size:28px;

  margin-bottom:10px;

  opacity:0.9;

}

.state{

  font-size:11px;

  opacity:0.35;

  letter-spacing:2px;

}

.top-left{
  top:80px;
  left:18%;
}

.top-right{
  top:80px;
  right:18%;
}

.bottom{
  bottom:40px;
  left:50%;
  transform:translateX(-50%);
}

/* =========================
   CARTAS CENTRALES
========================= */

.play-area{

  position:absolute;

  width:500px;
  height:300px;

}

.played-card{

  position:absolute;

  width:110px;
  height:150px;

  border:
    1px solid rgba(126,231,255,0.22);

  background:
    rgba(255,255,255,0.03);

  backdrop-filter:blur(5px);

  display:flex;
  justify-content:center;
  align-items:center;

  flex-direction:column;

  transition:0.6s;

  opacity:0;

  transform:
    scale(0.8)
    translateY(20px);

  box-shadow:
    0 0 25px rgba(126,231,255,0.08);

}

.played-card.show{

  opacity:1;

  transform:
    scale(1)
    translateY(0);

}

.played-card .team{

  font-size:12px;

  letter-spacing:2px;

  opacity:0.55;

  margin-bottom:10px;

}

.played-card .value{

  font-size:42px;

}

.played-card .sign{

  margin-top:8px;

  opacity:0.7;

}

/* posiciones */

.card-bot1{
  left:70px;
  top:30px;
}

.card-bot2{
  right:70px;
  top:30px;
}

.card-you{
  left:50%;
  bottom:0;
  transform:
    translateX(-50%)
    scale(0.8)
    translateY(20px);
}

.card-you.show{

  transform:
    translateX(-50%)
    scale(1)
    translateY(0);

}

/* =========================
   MANO
========================= */

.hand{

  position:absolute;

  bottom:20px;

  width:100%;

  display:flex;
  justify-content:center;
  gap:12px;

}

.card{

  width:90px;
  height:130px;

  border:
    1px solid rgba(255,255,255,0.12);

  background:
    rgba(255,255,255,0.03);

  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;

  cursor:pointer;

  transition:0.3s;

  backdrop-filter:blur(5px);

}

.card:hover{

  transform:
    translateY(-10px);

  border-color:#7ee7ff;

  box-shadow:
    0 0 30px rgba(126,231,255,0.18);

}

.card .team{

  font-size:11px;
  letter-spacing:2px;
  opacity:0.5;
  margin-bottom:8px;

}

.card .value{
  font-size:34px;
}

.card .sign{
  margin-top:8px;
  opacity:0.7;
}

/* =========================
   MENSAJES
========================= */

.message{

  position:absolute;

  top:50%;

  left:50%;

  transform:translate(-50%,-50%);

  text-align:center;

  opacity:0;

  transition:1.2s;

  pointer-events:none;

}

.message.show{
  opacity:0.65;
}

.message .big{

  font-size:30px;

  margin-bottom:15px;

  letter-spacing:4px;

}

.message .small{

  font-size:13px;

  opacity:0.6;

  letter-spacing:2px;

  line-height:1.8;

}

/* =========================
   RESULTADO
========================= */

.result{

  position:absolute;

  top:50%;

  left:50%;

  transform:translate(-50%,-50%);

  text-align:center;

  opacity:0;

  transition:1s;

}

.result.show{
  opacity:1;
}

.result h2{

  font-weight:normal;

  letter-spacing:5px;

  margin-bottom:18px;

  opacity:0.5;

}

.result p{

  font-size:30px;

  line-height:1.6;

}

/* =========================
   MOBILE
========================= */

@media(max-width:900px){

  .top-left{
    left:5%;
  }

  .top-right{
    right:5%;
  }

  .card{
    width:70px;
    height:110px;
  }

  .card .value{
    font-size:24px;
  }

}

</style>

</head>

<body>

<div class="particles" id="particles"></div>

<div class="table">

  <div class="center"></div>

  <!-- jugadores -->

  <div class="player top-left">

    <div class="player-name">
      ECO
    </div>

    <div class="hp" id="hpBot1">
      5 HP
    </div>

    <div class="state" id="stateBot1">
      OBSERVANDO
    </div>

  </div>

  <div class="player top-right">

    <div class="player-name">
      MAREA
    </div>

    <div class="hp" id="hpBot2">
      5 HP
    </div>

    <div class="state" id="stateBot2">
      ESPERANDO
    </div>

  </div>

  <div class="player bottom">

    <div class="player-name">
      VOS
    </div>

    <div class="hp" id="hpYou">
      5 HP
    </div>

    <div class="state">
      ELIGIENDO
    </div>

  </div>

  <!-- cartas -->

  <div class="play-area" id="playArea"></div>

  <!-- mensajes -->

  <div class="message" id="message">

    <div class="big" id="messageBig">
      EL MAR OBSERVA
    </div>

    <div class="small" id="messageSmall">
      Cada decisión altera el grupo.
    </div>

  </div>

  <!-- resultado -->

  <div class="result" id="result"></div>

</div>

<!-- mano -->

<div class="hand" id="hand"></div>

<script>

/* =========================
   SONIDOS
========================= */

const audioCtx =
new (window.AudioContext ||
window.webkitAudioContext)();

function playTone(freq,duration=0.12,volume=0.03){

  const osc =
    audioCtx.createOscillator();

  const gain =
    audioCtx.createGain();

  osc.type = "sine";

  osc.frequency.value = freq;

  gain.gain.value = volume;

  osc.connect(gain);

  gain.connect(audioCtx.destination);

  osc.start();

  gain.gain.exponentialRampToValueAtTime(
    0.0001,
    audioCtx.currentTime + duration
  );

  osc.stop(
    audioCtx.currentTime + duration
  );

}

/* =========================
   PARTICULAS
========================= */

const particles =
document.getElementById("particles");

for(let i=0;i<60;i++){

  const p =
    document.createElement("span");

  p.style.left =
    Math.random()*100 + "%";

  p.style.top =
    Math.random()*100 + "%";

  p.style.animationDuration =
    (20 + Math.random()*40) + "s";

  p.style.animationDelay =
    (-Math.random()*50) + "s";

  particles.appendChild(p);

}

/* =========================
   VARIABLES
========================= */

const hand =
document.getElementById("hand");

const playArea =
document.getElementById("playArea");

const result =
document.getElementById("result");

const message =
document.getElementById("message");

let hpYou = 5;
let hpBot1 = 5;
let hpBot2 = 5;

/* =========================
   CREAR CARTAS
========================= */

function generateCards(){

  hand.innerHTML = "";

  const cards = [];

  ["Algas","Corales"].forEach(team=>{

    ["+","-"].forEach(sign=>{

      for(let i=1;i<=3;i++){

        cards.push({
          team,
          sign,
          value:i
        });

      }

    });

  });

  cards.forEach(c=>{

    const el =
      document.createElement("div");

    el.className = "card";

    el.innerHTML = `

      <div class="team">
        ${c.team}
      </div>

      <div class="value">
        ${c.value}
      </div>

      <div class="sign">
        ${c.sign}
      </div>

    `;

    el.onclick = ()=>{

      playTone(220);

      playRound(c);

    };

    hand.appendChild(el);

  });

}

generateCards();

/* =========================
   IA
========================= */

function randomBot(){

  const teams =
    ["Algas","Corales"];

  const signs =
    ["+","-"];

  return {

    team:
      teams[Math.floor(Math.random()*2)],

    sign:
      signs[Math.floor(Math.random()*2)],

    value:
      Math.floor(Math.random()*3)+1

  };

}

/* =========================
   MOSTRAR CARTAS
========================= */

function showCard(data,cls){

  const card =
    document.createElement("div");

  card.className =
    "played-card " + cls;

  card.innerHTML = `

    <div class="team">
      ${data.team}
    </div>

    <div class="value">
      ${data.value}
    </div>

    <div class="sign">
      ${data.sign}
    </div>

  `;

  playArea.appendChild(card);

  setTimeout(()=>{
    card.classList.add("show");
  },50);

  return card;

}

/* =========================
   MENSAJES
========================= */

function showMessage(big,small){

  document.getElementById("messageBig")
  .innerText = big;

  document.getElementById("messageSmall")
  .innerText = small;

  message.classList.add("show");

  setTimeout(()=>{
    message.classList.remove("show");
  },2400);

}

/* =========================
   RONDA
========================= */

function playRound(playerCard){

  hand.style.pointerEvents = "none";

  playArea.innerHTML = "";

  result.classList.remove("show");

  showMessage(
    "EL GRUPO SE DIVIDE",
    "Las decisiones emergen lentamente."
  );

  const bot1 =
    randomBot();

  const bot2 =
    randomBot();

  const cards = [

    {
      ...playerCard,
      owner:"you"
    },

    {
      ...bot1,
      owner:"bot1"
    },

    {
      ...bot2,
      owner:"bot2"
    }

  ];

  setTimeout(()=>{

    showCard(
      playerCard,
      "card-you"
    );

    playTone(180);

  },500);

  setTimeout(()=>{

    showCard(
      bot1,
      "card-bot1"
    );

    playTone(150);

  },1300);

  setTimeout(()=>{

    showCard(
      bot2,
      "card-bot2"
    );

    playTone(120);

  },2200);

  setTimeout(()=>{

    resolveRound(cards);

  },3500);

}

/* =========================
   RESOLVER
========================= */

function resolveRound(cards){

  const algas =
    cards.filter(c=>c.team==="Algas");

  const corales =
    cards.filter(c=>c.team==="Corales");

  let mayoria =
    algas.length >= corales.length
    ? algas
    : corales;

  let minoria =
    algas.length < corales.length
    ? algas
    : corales;

  const sumMayoria =
    Math.abs(
      mayoria.reduce((a,b)=>
        a + (
          b.sign === "+"
          ? b.value
          : -b.value
        ),0)
    );

  const sumMinoria =
    Math.abs(
      minoria.reduce((a,b)=>
        a + (
          b.sign === "+"
          ? b.value
          : -b.value
        ),0)
    );

  let target =
    sumMayoria > 3
    ? mayoria
    : minoria;

  if(sumMinoria > sumMayoria){

    target =
      target === mayoria
      ? minoria
      : mayoria;

    showMessage(
      "TORNADO",
      "La minoría altera el flujo."
    );

    playTone(90,0.4,0.05);

  }

  if(sumMayoria === 0){

    showMessage(
      "MAREA",
      "La minoría recupera energía."
    );

    playTone(260,0.6,0.04);

    result.innerHTML = `

      <h2>
        RESULTADO
      </h2>

      <p>
        La Minoría recupera 2 HP
      </p>

    `;

    result.classList.add("show");

    hand.style.pointerEvents = "all";

    return;

  }

  target.forEach(p=>{

    if(p.owner === "you"){
      hpYou -= sumMayoria;
    }

    if(p.owner === "bot1"){
      hpBot1 -= sumMayoria;
    }

    if(p.owner === "bot2"){
      hpBot2 -= sumMayoria;
    }

  });

  updateHP();

  result.innerHTML = `

    <h2>
      RESULTADO
    </h2>

    <p>
      ${target === mayoria
        ? "La Mayoría"
        : "La Minoría"}
      recibe
      ${sumMayoria}
      de daño
    </p>

  `;

  result.classList.add("show");

  playTone(70,0.5,0.06);

  checkEnd();

  hand.style.pointerEvents = "all";

}

/* =========================
   HP
========================= */

function updateHP(){

  document.getElementById("hpYou")
  .innerText =
    Math.max(0,hpYou) + " HP";

  document.getElementById("hpBot1")
  .innerText =
    Math.max(0,hpBot1) + " HP";

  document.getElementById("hpBot2")
  .innerText =
    Math.max(0,hpBot2) + " HP";

}

/* =========================
   FINAL
========================= */

function checkEnd(){

  if(hpYou <= 0){

    showMessage(
      "EL MAR TE ABSORBE",
      "Toda decisión deja un eco."
    );

  }

  if(hpBot1 <= 0){

    document.getElementById("stateBot1")
    .innerText = "DISUELTO";

  }

  if(hpBot2 <= 0){

    document.getElementById("stateBot2")
    .innerText = "DISUELTO";

  }

}

</script>

</body>
</html>
