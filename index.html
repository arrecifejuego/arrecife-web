<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Arrecife — Simulación</title>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{

  background:#000;

  color:white;

  font-family:Arial,sans-serif;

  overflow:hidden;

  height:100vh;

  position:relative;

}

/* =========================
   FONDO
========================= */

.ocean{
  position:fixed;
  inset:0;
  overflow:hidden;
  pointer-events:none;
}

.wave{

  position:absolute;

  width:220%;
  height:220%;

  left:-60%;
  top:-60%;

  background:
    radial-gradient(
      circle at center,
      rgba(126,231,255,0.04),
      transparent 60%
    );

  animation:rotateWave 60s linear infinite;

}

.wave2{
  animation-duration:90s;
  opacity:0.45;
  transform:scale(1.25);
}

.wave3{
  animation-duration:120s;
  opacity:0.2;
  transform:scale(1.5);
}

@keyframes rotateWave{

  from{
    transform:rotate(0deg);
  }

  to{
    transform:rotate(360deg);
  }

}

/* =========================
   CRIATURAS
========================= */

.deep-sea{
  position:fixed;
  inset:0;
  overflow:hidden;
  pointer-events:none;
}

.creature{

  position:absolute;

  border:
    1px solid rgba(126,231,255,0.16);

  border-radius:50%;

  box-shadow:
    0 0 30px rgba(126,231,255,0.08);

  opacity:0.16;

  filter:blur(0.5px);

}

.creature1{
  width:600px;
  height:170px;
  top:18%;
  left:-700px;
  animation:swim1 80s linear infinite;
}

.creature2{
  width:380px;
  height:380px;
  top:65%;
  right:-450px;
  animation:swim2 120s linear infinite;
}

@keyframes swim1{

  from{
    transform:translateX(0);
  }

  to{
    transform:translateX(3000px);
  }

}

@keyframes swim2{

  from{
    transform:translateX(0) rotate(0deg);
  }

  to{
    transform:translateX(-3000px) rotate(80deg);
  }

}

/* =========================
   HUD
========================= */

.top-ui{

  position:absolute;

  top:25px;
  left:50%;

  transform:translateX(-50%);

  text-align:center;

  z-index:5;

}

.logo{

  letter-spacing:10px;

  font-size:11px;

  opacity:0.45;

  margin-bottom:18px;

}

h1{

  font-size:34px;

  font-weight:normal;

  margin-bottom:10px;

}

.sub{

  opacity:0.45;

  font-size:13px;

  line-height:1.8;

}

.config{

  margin-top:25px;

}

select{

  background:#050505;

  color:white;

  border:
    1px solid rgba(255,255,255,0.15);

  padding:10px 16px;

  font-size:13px;

  letter-spacing:2px;

  outline:none;

}

/* =========================
   MESA
========================= */

.table{

  position:absolute;

  inset:0;

  display:flex;

  justify-content:center;
  align-items:center;

}

.table-ring{

  position:relative;

  width:700px;
  height:700px;

  border-radius:50%;

  border:
    1px solid rgba(126,231,255,0.08);

  box-shadow:
    0 0 60px rgba(126,231,255,0.05);

}

/* =========================
   JUGADORES
========================= */

.player{

  position:absolute;

  width:150px;

  transform:
    translate(-50%, -50%);

  text-align:center;

}

.player-name{

  letter-spacing:2px;

  font-size:11px;

  opacity:0.55;

  margin-bottom:6px;

}

.player-hp{

  font-size:13px;

  opacity:0.75;

  margin-bottom:12px;

}

.cards{

  display:flex;

  justify-content:center;

  gap:8px;

  flex-wrap:wrap;

  min-height:42px;

}

.played{

  border:
    1px solid rgba(126,231,255,0.18);

  background:
    rgba(126,231,255,0.05);

  padding:8px 10px;

  min-width:42px;

  font-size:13px;

  animation:fadeCard 0.5s ease;

}

@keyframes fadeCard{

  from{
    opacity:0;
    transform:translateY(10px);
  }

  to{
    opacity:1;
    transform:translateY(0);
  }

}

/* =========================
   MANO
========================= */

.hand{

  position:absolute;

  bottom:35px;

  left:50%;

  transform:translateX(-50%);

  display:flex;

  gap:12px;

  flex-wrap:wrap;

  justify-content:center;

  width:90%;

  z-index:6;

}

.card{

  border:
    1px solid rgba(255,255,255,0.14);

  padding:14px 18px;

  min-width:58px;

  text-align:center;

  cursor:pointer;

  transition:0.25s;

  background:
    rgba(255,255,255,0.02);

  backdrop-filter:blur(5px);

}

.card:hover{

  border-color:#7ee7ff;

  box-shadow:
    0 0 18px rgba(126,231,255,0.15);

  transform:translateY(-2px);

}

/* =========================
   BOTONES
========================= */

.controls{

  position:absolute;

  bottom:140px;

  left:50%;

  transform:translateX(-50%);

  z-index:6;

}

button{

  background:transparent;

  color:white;

  border:
    1px solid rgba(255,255,255,0.18);

  padding:14px 34px;

  letter-spacing:3px;

  cursor:pointer;

  transition:0.3s;

}

button:hover{

  background:#7ee7ff;

  color:black;

  box-shadow:
    0 0 24px rgba(126,231,255,0.2);

}

/* =========================
   RESULTADO
========================= */

.result{

  position:absolute;

  top:50%;

  left:50%;

  transform:
    translate(-50%, -50%);

  width:420px;

  text-align:center;

  z-index:7;

  pointer-events:none;

}

.result-box{

  border:
    1px solid rgba(126,231,255,0.18);

  background:
    rgba(0,0,0,0.82);

  padding:28px;

  backdrop-filter:blur(10px);

  animation:fadeIn 0.6s ease;

}

.result-title{

  font-size:11px;

  letter-spacing:4px;

  opacity:0.45;

  margin-bottom:18px;

}

.result-text{

  font-size:24px;

  line-height:1.7;

}

.event{

  margin-top:20px;

  font-size:14px;

  opacity:0.75;

}

@keyframes fadeIn{

  from{
    opacity:0;
    transform:translateY(10px);
  }

  to{
    opacity:1;
    transform:translateY(0);
  }

}

.final{

  font-size:32px;

  letter-spacing:4px;

  opacity:0.7;

}

@media(max-width:900px){

  .table-ring{

    width:520px;
    height:520px;

  }

}

</style>

</head>

<body>

<div class="ocean">

  <div class="wave"></div>
  <div class="wave wave2"></div>
  <div class="wave wave3"></div>

</div>

<div class="deep-sea">

  <div class="creature creature1"></div>
  <div class="creature creature2"></div>

</div>

<div class="top-ui">

  <div class="logo">
    ARRECIFE
  </div>

  <h1>Simulación</h1>

  <div class="sub">
    Observá cómo se mueve el grupo.
  </div>

  <div class="config">

    <select id="playerCount">

      <option value="3">3 jugadores</option>
      <option value="4">4 jugadores</option>
      <option value="5" selected>5 jugadores</option>
      <option value="6">6 jugadores</option>
      <option value="7">7 jugadores</option>

    </select>

  </div>

</div>

<div class="table">

  <div class="table-ring" id="tableRing"></div>

</div>

<div class="controls">

  <button
    id="resolveBtn"
    style="display:none;"
  >
    RESOLVER RONDA
  </button>

</div>

<div class="hand" id="hand"></div>

<div class="result" id="result"></div>

<script>

/* =========================
   ESTADO
========================= */

let players = [];

let phase = 1;

let round = 1;

const tableRing =
document.getElementById("tableRing");

const hand =
document.getElementById("hand");

const result =
document.getElementById("result");

const resolveBtn =
document.getElementById("resolveBtn");

/* =========================
   CREAR PARTIDA
========================= */

function createGame(count){

  players = [];

  for(let i=0;i<count;i++){

    players.push({

      id:i,

      name:
        i===0
        ? "TÚ"
        : "BOT " + i,

      hp:10,

      played:[],

      bot:i!==0

    });

  }

  phase = 1;

  round = 1;

  render();

}

document.getElementById("playerCount")
.addEventListener("change", e=>{

  createGame(
    parseInt(e.target.value)
  );

});

createGame(5);

/* =========================
   RENDER
========================= */

function render(){

  tableRing.innerHTML = "";

  const alive =
    players.filter(p=>p.hp>0);

  const total =
    alive.length;

  const radius = 300;

  alive.forEach((player,index)=>{

    const angle =
      (Math.PI*2/total)*index
      - Math.PI/2;

    const x =
      350 + Math.cos(angle)*radius;

    const y =
      350 + Math.sin(angle)*radius;

    const div =
      document.createElement("div");

    div.className = "player";

    div.style.left = x + "px";
    div.style.top = y + "px";

    div.innerHTML = `

      <div class="player-name">
        ${player.name}
      </div>

      <div class="player-hp">
        ${player.hp} HP
      </div>

      <div class="cards">

        ${player.played.map(card=>`

          <div class="played">
            ${card}
          </div>

        `).join("")}

      </div>

    `;

    tableRing.appendChild(div);

  });

  renderHand();

}

/* =========================
   MANO
========================= */

function renderHand(){

  const you = players[0];

  if(you.hp <= 0){

    hand.innerHTML = "";
    return;

  }

  if(you.played.length >= 3){

    hand.innerHTML = "";

    resolveBtn.style.display =
      "inline-block";

    return;

  }

  resolveBtn.style.display = "none";

  const used =
    [...you.played];

  let options = [];

  if(
    !used.includes("Algas") &&
    !used.includes("Corales")
  ){

    options.push(
      "Algas",
      "Corales"
    );

  }

  if(
    !used.includes("+") &&
    !used.includes("-")
  ){

    options.push("+","-");

  }

  const alreadyValue =
    used.some(v=>!isNaN(v));

  if(!alreadyValue){

    options.push(1,2,3,4,5);

  }

  hand.innerHTML =
    options.map(card=>`

      <div
        class="card"
        onclick="playCard('${card}')"
      >
        ${card}
      </div>

    `).join("");

}

/* =========================
   JUGAR
========================= */

function playCard(card){

  const you = players[0];

  you.played.push(card);

  botsPlay();

  phase++;

  render();

}

/* =========================
   BOTS
========================= */

function botsPlay(){

  players.forEach(player=>{

    if(!player.bot || player.hp<=0){
      return;
    }

    let used =
      [...player.played];

    let options = [];

    if(
      !used.includes("Algas") &&
      !used.includes("Corales")
    ){

      options.push(
        "Algas",
        "Corales"
      );

    }

    if(
      !used.includes("+") &&
      !used.includes("-")
    ){

      options.push("+","-");

    }

    const alreadyValue =
      used.some(v=>!isNaN(v));

    if(!alreadyValue){

      options.push(1,2,3,4,5);

    }

    const pick =
      options[
        Math.floor(
          Math.random()*options.length
        )
      ];

    player.played.push(pick);

  });

}

/* =========================
   RESOLVER
========================= */

resolveBtn.addEventListener(
  "click",
  resolveRound
);

function resolveRound(){

  const alive =
    players.filter(p=>p.hp>0);

  if(alive.length <= 2){

    result.innerHTML = `

      <div class="result-box">

        <div class="final">
          LA SIMULACIÓN FINALIZA
        </div>

      </div>

    `;

    hand.innerHTML = "";

    resolveBtn.style.display =
      "none";

    return;

  }

  const parsed = alive.map(p=>{

    const team =
      p.played.find(c=>
        c==="Algas" ||
        c==="Corales"
      );

    const sign =
      p.played.find(c=>
        c==="+" ||
        c==="-"
      );

    const value =
      parseInt(
        p.played.find(c=>!isNaN(c))
      );

    return {

      ref:p,

      team,
      sign,
      value,

      aporte:
        sign === "+"
        ? value
        : -value

    };

  });

  const algas =
    parsed.filter(
      p=>p.team==="Algas"
    );

  const corales =
    parsed.filter(
      p=>p.team==="Corales"
    );

  let mayoria;
  let minoria;

  if(algas.length > corales.length){

    mayoria = algas;
    minoria = corales;

  }else{

    mayoria = corales;
    minoria = algas;

  }

  const sumaMayoriaReal =
    mayoria.reduce(
      (a,b)=>a+b.aporte,
      0
    );

  const sumaMinoriaReal =
    minoria.reduce(
      (a,b)=>a+b.aporte,
      0
    );

  const sumaMayoria =
    Math.abs(sumaMayoriaReal);

  const sumaMinoria =
    Math.abs(sumaMinoriaReal);

  let dañoHacia =
    sumaMayoria > alive.length
    ? "Mayoría"
    : "Minoría";

  let tornado = false;

  if(
    sumaMinoria > sumaMayoria &&
    sumaMayoria !== 0
  ){

    tornado = true;

    dañoHacia =
      dañoHacia==="Mayoría"
      ? "Minoría"
      : "Mayoría";

  }

  if(sumaMayoria === 0){

    minoria.forEach(p=>{

      p.ref.hp =
        Math.min(
          10,
          p.ref.hp + 2
        );

    });

  }else{

    const target =
      dañoHacia==="Mayoría"
      ? mayoria
      : minoria;

    target.forEach(p=>{

      p.ref.hp -= sumaMayoria;

    });

  }

  result.innerHTML = `

    <div class="result-box">

      <div class="result-title">
        RESULTADO
      </div>

      <div class="result-text">

        ${
          sumaMayoria === 0
          ? "La Minoría recupera 2 HP."
          : `La ${dañoHacia} recibe ${sumaMayoria} de daño.`
        }

      </div>

      ${
        tornado
        ? `
          <div class="event">
            Tornado activado.
          </div>
        `
        : ""
      }

    </div>

  `;

  setTimeout(()=>{

    result.innerHTML = "";

    nextRound();

  },2500);

}

/* =========================
   NUEVA RONDA
========================= */

function nextRound(){

  players.forEach(p=>{

    p.played = [];

  });

  phase = 1;

  round++;

  render();

}

</script>

</body>
</html>
