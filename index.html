<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Arrecife — Ronda</title>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

html,body{
  width:100%;
  height:100%;
  overflow:hidden;
  background:#000;
  font-family:Arial, sans-serif;
  color:white;
}

body{
  position:relative;
}

/* =========================
   OCEANO
========================= */

.ocean{
  position:fixed;
  inset:0;
  overflow:hidden;
}

.wave{

  position:absolute;

  width:180%;
  height:180%;

  left:-40%;
  top:-40%;

  background:
    radial-gradient(
      circle at center,
      rgba(126,231,255,0.03),
      transparent 60%
    );

  animation:rotateWave 60s linear infinite;

}

.wave2{
  animation-duration:100s;
  opacity:0.5;
  transform:scale(1.2);
}

.wave3{
  animation-duration:140s;
  opacity:0.25;
  transform:scale(1.5);
}

@keyframes rotateWave{

  from{
    transform:rotate(0deg);
  }

  to{
    transform:rotate(360deg);
  }

}

/* =========================
   PARTICULAS
========================= */

.particles{
  position:fixed;
  inset:0;
  overflow:hidden;
  pointer-events:none;
}

.particles span{

  position:absolute;

  width:2px;
  height:2px;

  background:white;

  border-radius:50%;

  opacity:0.08;

  animation:floatParticle linear infinite;

}

@keyframes floatParticle{

  from{
    transform:translateY(100vh);
  }

  to{
    transform:translateY(-120vh);
  }

}

/* =========================
   UI
========================= */

.ui{
  position:relative;
  z-index:2;
  width:100%;
  height:100%;
  display:flex;
  flex-direction:column;
  justify-content:space-between;
  padding:40px;
}

.top{
  display:flex;
  justify-content:space-between;
}

.player-info{
  text-align:center;
  opacity:0.85;
}

.player-name{
  font-size:11px;
  letter-spacing:4px;
  opacity:0.5;
  margin-bottom:8px;
}

.hp{
  font-size:20px;
  margin-bottom:6px;
}

.estado{
  font-size:10px;
  letter-spacing:3px;
  opacity:0.35;
}

/* =========================
   MESA
========================= */

.table-area{
  flex:1;
  display:flex;
  justify-content:center;
  align-items:center;
  position:relative;
}

.circle{

  width:420px;
  height:420px;

  border-radius:50%;

  border:
    1px solid rgba(126,231,255,0.08);

  box-shadow:
    0 0 80px rgba(126,231,255,0.04);

  position:relative;

}

.revealed{

  position:absolute;

  width:120px;
  height:170px;

  border:
    1px solid rgba(255,255,255,0.14);

  background:
    rgba(255,255,255,0.02);

  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;

  backdrop-filter:blur(8px);

  transition:0.6s;

}

.revealed-title{
  font-size:10px;
  letter-spacing:3px;
  opacity:0.5;
  margin-bottom:14px;
}

.revealed-value{
  font-size:42px;
}

.you{
  bottom:-60px;
  left:50%;
  transform:translateX(-50%);
}

.bot1{
  top:30px;
  left:-40px;
}

.bot2{
  top:30px;
  right:-40px;
}

/* =========================
   LOG
========================= */

.log{

  position:absolute;

  bottom:230px;

  width:100%;

  text-align:center;

  font-size:12px;

  letter-spacing:3px;

  opacity:0.5;

}

/* =========================
   MANO
========================= */

.hand{

  display:flex;
  justify-content:center;
  flex-wrap:wrap;
  gap:14px;

  padding-bottom:25px;

}

.card{

  width:90px;
  height:130px;

  border:
    1px solid rgba(255,255,255,0.12);

  background:
    rgba(255,255,255,0.02);

  cursor:pointer;

  transition:0.3s;

  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;

  position:relative;

  overflow:hidden;

}

.card:hover{

  transform:
    translateY(-8px);

  border-color:
    rgba(126,231,255,0.6);

  box-shadow:
    0 0 25px rgba(126,231,255,0.15);

}

.card.used{
  opacity:0.15;
  pointer-events:none;
  transform:scale(0.9);
}

.card-type{
  font-size:10px;
  letter-spacing:2px;
  opacity:0.45;
  margin-bottom:12px;
}

.card-value{
  font-size:24px;
}

/* =========================
   RESULTADO
========================= */

.result{

  position:absolute;

  top:50%;
  left:50%;

  transform:
    translate(-50%,-50%);

  text-align:center;

  opacity:0;

  transition:1s;

  pointer-events:none;

}

.result.show{
  opacity:1;
}

.result-title{

  font-size:12px;

  letter-spacing:5px;

  opacity:0.5;

  margin-bottom:25px;

}

.result-text{

  font-size:32px;

  line-height:1.6;

}

@media(max-width:900px){

  .circle{
    width:300px;
    height:300px;
  }

  .revealed{
    width:90px;
    height:130px;
  }

  .revealed-value{
    font-size:28px;
  }

}

</style>

</head>

<body>

<div class="ocean">

  <div class="wave"></div>
  <div class="wave wave2"></div>
  <div class="wave wave3"></div>

</div>

<div class="particles" id="particles"></div>

<div class="ui">

  <div class="top">

    <div class="player-info">

      <div class="player-name">
        ECO
      </div>

      <div class="hp" id="hpBot1">
        30 HP
      </div>

      <div class="estado">
        OBSERVANDO
      </div>

    </div>

    <div class="player-info">

      <div class="player-name">
        MAREA
      </div>

      <div class="hp" id="hpBot2">
        30 HP
      </div>

      <div class="estado">
        ESPERANDO
      </div>

    </div>

  </div>

  <div class="table-area">

    <div class="circle">

      <div class="revealed bot1" id="bot1Card"></div>

      <div class="revealed bot2" id="bot2Card"></div>

      <div class="revealed you" id="youCard"></div>

    </div>

    <div class="result" id="result"></div>

  </div>

  <div class="log" id="log">
    PRIMERA REVELACIÓN
  </div>

  <div class="hand" id="hand"></div>

</div>

<script>

/* =========================
   PARTICULAS
========================= */

const particles =
document.getElementById("particles");

for(let i=0;i<45;i++){

  const p =
    document.createElement("span");

  p.style.left =
    Math.random()*100 + "%";

  p.style.animationDuration =
    (20 + Math.random()*40) + "s";

  p.style.animationDelay =
    (-Math.random()*50) + "s";

  p.style.opacity =
    Math.random()*0.12;

  particles.appendChild(p);

}

/* =========================
   DATOS
========================= */

const hand = [

  { type:"Equipo", value:"Algas" },
  { type:"Equipo", value:"Corales" },

  { type:"Signo", value:"+" },
  { type:"Signo", value:"-" },

  { type:"Valor", value:"1" },
  { type:"Valor", value:"2" },
  { type:"Valor", value:"3" }

];

let round = 1;

const yourPlayed = [];
const bot1Played = [];
const bot2Played = [];

/* =========================
   RENDER
========================= */

function renderHand(){

  const handDiv =
    document.getElementById("hand");

  handDiv.innerHTML = "";

  hand.forEach((card,index)=>{

    const div =
      document.createElement("div");

    div.className = "card";

    if(card.used){

      div.classList.add("used");

    }

    div.innerHTML = `

      <div class="card-type">
        ${card.type}
      </div>

      <div class="card-value">
        ${card.value}
      </div>

    `;

    div.onclick = ()=>{

      if(card.used) return;

      playCard(index);

    };

    handDiv.appendChild(div);

  });

}

renderHand();

/* =========================
   JUGAR
========================= */

function playCard(index){

  const card = hand[index];

  card.used = true;

  yourPlayed.push(card);

  revealCard(
    "youCard",
    card
  );

  renderHand();

  document.getElementById("log")
  .innerText =
    "LOS DEMÁS ESTÁN ELIGIENDO";

  setTimeout(()=>{

    botTurn();

  },1200);

}

function botTurn(){

  const bot1 =
    randomBotCard(bot1Played);

  const bot2 =
    randomBotCard(bot2Played);

  bot1Played.push(bot1);
  bot2Played.push(bot2);

  revealCard(
    "bot1Card",
    bot1
  );

  revealCard(
    "bot2Card",
    bot2
  );

  if(round < 3){

    round++;

    const textos = [
      "",
      "SEGUNDA REVELACIÓN",
      "REVELACIÓN FINAL"
    ];

    document.getElementById("log")
    .innerText =
      textos[round-1];

  }else{

    resolveRound();

  }

}

function randomBotCard(played){

  const possible = [

    { type:"Equipo", value:"Algas" },
    { type:"Equipo", value:"Corales" },

    { type:"Signo", value:"+" },
    { type:"Signo", value:"-" },

    { type:"Valor", value:"1" },
    { type:"Valor", value:"2" },
    { type:"Valor", value:"3" }

  ];

  const available =
    possible.filter(p=>

      !played.some(a=>

        a.type===p.type &&
        a.value===p.value

      )

    );

  return available[
    Math.floor(
      Math.random()*available.length
    )
  ];

}

/* =========================
   VISUAL
========================= */

function revealCard(id,card){

  const el =
    document.getElementById(id);

  el.innerHTML = `

    <div class="revealed-title">
      ${card.type}
    </div>

    <div class="revealed-value">
      ${card.value}
    </div>

  `;

}

/* =========================
   RESOLUCION
========================= */

function resolveRound(){

  document.getElementById("log")
  .innerText =
    "INTERPRETANDO EL MAR";

  const result =
    document.getElementById("result");

  setTimeout(()=>{

    result.classList.add("show");

    result.innerHTML = `

      <div class="result-title">
        RESULTADO
      </div>

      <div class="result-text">
        La Minoría recibe 3 de daño.
      </div>

    `;

  },1500);

}

</script>

</body>

</html>
